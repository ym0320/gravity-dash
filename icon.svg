<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="player" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00b8d4"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#152a45"/>
    </linearGradient>
    <linearGradient id="ceilGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#152a45"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="160" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="140" r="2.5" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="200" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="340" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="320" r="1.8" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="250" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="270" r="2" fill="#fff" opacity="0.3"/>
  <!-- Floor terrain (rectangular stepped platforms) -->
  <path d="M0 430 L0 512 L80 512 L80 430 L80 430 L120 430 L120 415 L200 415 L200 430 L260 430 L260 400 L330 400 L330 420 L400 420 L400 430 L460 430 L460 410 L512 410 L512 512 L0 512 Z" fill="url(#floorGrad)" opacity="0.9"/>
  <!-- Floor neon edges -->
  <path d="M0 430 L80 430 L80 430" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="80" y1="430" x2="80" y2="415" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <line x1="120" y1="430" x2="120" y2="415" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M80 415 L120 415" stroke="#2a6aaf" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M120 430 L200 430" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="200" y1="430" x2="200" y2="415" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M200 415 L200 430" stroke="#2a6aaf" stroke-width="2.5" fill="none" opacity="0.7"/>
  <line x1="260" y1="430" x2="260" y2="400" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M260 400 L330 400" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="330" y1="400" x2="330" y2="420" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M330 420 L400 420" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="400" y1="420" x2="400" y2="430" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M400 430 L460 430" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="460" y1="430" x2="460" y2="410" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M460 410 L512 410" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <!-- Floor glow -->
  <path d="M0 430 L80 430 M120 430 L200 430 M200 415 L260 415 M260 400 L330 400 M330 420 L400 420 M400 430 L460 430 M460 410 L512 410" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.4" filter="url(#blur)"/>
  <!-- Ceiling terrain (rectangular stepped platforms) -->
  <path d="M0 0 L0 82 L60 82 L60 95 L130 95 L130 80 L190 80 L190 82 L250 82 L250 100 L320 100 L320 85 L380 85 L380 82 L440 82 L440 90 L512 90 L512 0 Z" fill="url(#ceilGrad)" opacity="0.9"/>
  <!-- Ceiling neon edges -->
  <path d="M0 82 L60 82" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="60" y1="82" x2="60" y2="95" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M60 95 L130 95" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="130" y1="95" x2="130" y2="80" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M130 80 L190 80" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="190" y1="80" x2="190" y2="82" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M190 82 L250 82" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="250" y1="82" x2="250" y2="100" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M250 100 L320 100" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="320" y1="100" x2="320" y2="85" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M320 85 L380 85" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="380" y1="85" x2="380" y2="82" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M380 82 L440 82" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <line x1="440" y1="82" x2="440" y2="90" stroke="#2a6aaf" stroke-width="2.5" opacity="0.7"/>
  <path d="M440 90 L512 90" stroke="#2a6aaf" stroke-width="3" fill="none" opacity="0.9"/>
  <!-- Player cube -->
  <g transform="translate(256, 256)">
    <!-- Glow -->
    <rect x="-52" y="-52" width="104" height="104" rx="16" fill="#00e5ff" opacity="0.15"/>
    <!-- Body -->
    <rect x="-44" y="-44" width="88" height="88" rx="14" fill="url(#player)"/>
    <!-- Inner -->
    <rect x="-32" y="-32" width="64" height="64" rx="9" fill="#fff" opacity="0.12"/>
    <!-- Eye -->
    <circle cx="12" cy="-9" r="16" fill="#fff"/>
    <circle cx="16" cy="-9" r="8" fill="#0a0a2e"/>
    <circle cx="20" cy="-14" r="3.5" fill="#fff"/>
    <!-- Arrow (gravity indicator) -->
    <path d="M-18 60 L0 76 L18 60" stroke="#fff" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Coin -->
  <circle cx="285" cy="175" r="22" fill="#ffd700" opacity="0.8"/>
  <circle cx="280" cy="170" r="7" fill="#fff" opacity="0.4"/>
  <!-- Trail particles -->
  <rect x="180" y="242" width="18" height="18" rx="4" fill="#00e5ff" opacity="0.15"/>
  <rect x="200" y="246" width="14" height="14" rx="3" fill="#00e5ff" opacity="0.1"/>
</svg>
