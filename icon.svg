<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="player" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00b8d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="100" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="80" r="2.5" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="150" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="380" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="400" r="1.8" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="250" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="280" r="2" fill="#fff" opacity="0.3"/>
  <!-- Ground lines -->
  <line x1="0" y1="420" x2="512" y2="420" stroke="#2a6aaf" stroke-width="3" opacity="0.6"/>
  <line x1="0" y1="92" x2="512" y2="92" stroke="#2a6aaf" stroke-width="3" opacity="0.6"/>
  <!-- Obstacles -->
  <rect x="130" y="92" width="28" height="120" rx="4" fill="#ff3860" opacity="0.7"/>
  <rect x="130" y="290" width="28" height="130" rx="4" fill="#ff3860" opacity="0.7"/>
  <rect x="350" y="92" width="28" height="170" rx="4" fill="#ff3860" opacity="0.5"/>
  <rect x="350" y="340" width="28" height="80" rx="4" fill="#ff3860" opacity="0.5"/>
  <!-- Player cube -->
  <g transform="translate(256, 256)">
    <!-- Glow -->
    <rect x="-52" y="-52" width="104" height="104" rx="16" fill="#00e5ff" opacity="0.15"/>
    <!-- Body -->
    <rect x="-44" y="-44" width="88" height="88" rx="14" fill="url(#player)"/>
    <!-- Inner -->
    <rect x="-32" y="-32" width="64" height="64" rx="9" fill="#fff" opacity="0.12"/>
    <!-- Eye -->
    <circle cx="12" cy="-9" r="16" fill="#fff"/>
    <circle cx="16" cy="-9" r="8" fill="#0a0a2e"/>
    <circle cx="20" cy="-14" r="3.5" fill="#fff"/>
    <!-- Arrow (gravity indicator) -->
    <path d="M-18 60 L0 76 L18 60" stroke="#fff" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Coin -->
  <circle cx="285" cy="175" r="22" fill="#ffd700" opacity="0.8"/>
  <circle cx="280" cy="170" r="7" fill="#fff" opacity="0.4"/>
  <!-- Trail particles -->
  <rect x="180" y="242" width="18" height="18" rx="4" fill="#00e5ff" opacity="0.15"/>
  <rect x="200" y="246" width="14" height="14" rx="3" fill="#00e5ff" opacity="0.1"/>
</svg>
