function sfxFanfare(){
  if(!audioCtx)return;try{
    const t=audioCtx.currentTime;
    // Rising arpeggio fanfare
    [523,659,784,1047].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);o.type='sine';
      o.frequency.setValueAtTime(f,t+i*0.1);
      g.gain.setValueAtTime(0.15,t+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.3);
      o.start(t+i*0.1);o.stop(t+i*0.1+0.35);
    });
    // Final chord
    [1047,1319,1568].forEach(f=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);o.type='triangle';
      o.frequency.setValueAtTime(f,t+0.45);
      g.gain.setValueAtTime(0.1,t+0.45);g.gain.exponentialRampToValueAtTime(0.001,t+1.0);
      o.start(t+0.45);o.stop(t+1.05);
    });
  }catch(e){}
}
function sfxBossAlert(){
  if(!audioCtx)return;try{
    const t=audioCtx.currentTime;
    // Ominous low drone
    const drone=audioCtx.createOscillator(),dg=audioCtx.createGain();
    drone.connect(dg);dg.connect(audioCtx.destination);drone.type='sawtooth';
    drone.frequency.setValueAtTime(55,t);drone.frequency.linearRampToValueAtTime(40,t+1.5);
    dg.gain.setValueAtTime(0.2,t);dg.gain.linearRampToValueAtTime(0.3,t+0.8);dg.gain.exponentialRampToValueAtTime(0.001,t+2.0);
    drone.start(t);drone.stop(t+2.1);
    // Dissonant stabs (descending minor seconds)
    [220,208,196,185,175].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);o.type='square';
      const st=t+i*0.3;
      o.frequency.setValueAtTime(f,st);
      g.gain.setValueAtTime(0.18,st);g.gain.exponentialRampToValueAtTime(0.001,st+0.25);
      o.start(st);o.stop(st+0.3);
    });
    // Rising siren
    const sir=audioCtx.createOscillator(),sg=audioCtx.createGain();
    sir.connect(sg);sg.connect(audioCtx.destination);sir.type='sawtooth';
    sir.frequency.setValueAtTime(300,t+0.5);sir.frequency.exponentialRampToValueAtTime(900,t+1.8);
    sg.gain.setValueAtTime(0,t+0.5);sg.gain.linearRampToValueAtTime(0.15,t+0.8);sg.gain.exponentialRampToValueAtTime(0.001,t+2.0);
    sir.start(t+0.5);sir.stop(t+2.1);
    // Impact hit
    const imp=audioCtx.createOscillator(),ig=audioCtx.createGain();
    imp.connect(ig);ig.connect(audioCtx.destination);imp.type='triangle';
    imp.frequency.setValueAtTime(80,t+1.8);imp.frequency.exponentialRampToValueAtTime(20,t+2.5);

    imp.start(t+1.8);imp.stop(t+2.6);
  }catch(e){}
}

function switchBGM(type){
  if(!audioCtx||bgmCurrent===type)return;
  bgmCurrent=type;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}
  const def=type==='title'?BGM_TITLE:type==='play'?BGM_PLAY:type==='fever'?BGM_FEVER:BGM_DEAD;
  let bi=0;
  (function play(){
    if(bgmCurrent!==type)return;
    try{
      const now=audioCtx.currentTime;
      const dur=def.tempo/1000;
      // Melody
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(bgmGain);o.type=def.wave;
      o.frequency.setValueAtTime(def.notes[bi%def.notes.length],now);
      g.gain.setValueAtTime(def.vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+dur*0.9);
      o.start(now);o.stop(now+dur*0.95);
      // Bass (every other beat)
      if(bi%2===0){
        const b=audioCtx.createOscillator(),g2=audioCtx.createGain();
        b.connect(g2);g2.connect(bgmGain);b.type=def.bassWave;
        b.frequency.setValueAtTime(def.bass[bi%def.bass.length],now);
        g2.gain.setValueAtTime(def.bassVol,now);g2.gain.exponentialRampToValueAtTime(0.001,now+dur*1.2);

function generateTerrain(arr,isFloor,startX,count,rng){
  const rand=rng||Math.random;
  const last=arr.length>0?arr[arr.length-1]:null;
  let h=last?last.h:GROUND_H;
  const hc=isStageMode&&currentStageData?currentStageData.hillChance:0.08;
  for(let i=0;i<count;i++){
    const x=startX+i*SEG_W;
    const r=rand();
    if(r<hc*0.25&&(isStageMode?dist>20:score>30)) h=Math.min(H*0.35,h+35+rand()*25);
    else if(r<hc*0.5) h=Math.max(35,h-20-rand()*15);
    else if(r<hc&&(isStageMode?dist>5:score>15)) h+=8+rand()*12;
    else if(r<hc*2) h-=5+rand()*8;
    else h+=(rand()-0.5)*4;
    h=Math.max(45+safeBot,Math.min(H*0.38,h));
    arr.push({x,h});
  }
  // Forced gap for flip zones: create a large gap to force gravity flip
  if(forceGap){
    const gapSize=120+Math.random()*80;
    arr.push({x:lastRight+gapSize,w:60+Math.random()*40,h:lastH});
    return;
  }
  // Gap (valleys): NONE until first boss defeated (bossCount>=1), then gradually increase
  let gap=0;
  if(bossPhase.bossCount>=1&&score>100){
    const gc=Math.min(0.3,0.02+(score-100)*0.0015);
    if(Math.random()<gc){
      const maxGap=Math.min(70,10+(score-100)*0.25);
      gap=15+Math.random()*maxGap;
    }
  }
  // Height change (step): very gradual, flat-focused early game
  let h=lastH;
  if(score<40){
    // Long flat section with very occasional tiny steps
    const stepC=Math.min(0.1,0.005+score*0.002);
    if(Math.random()<stepC){
      const maxDh=Math.min(8,2+score*0.15);
      const dh=(Math.random()<0.5?1:-1)*(2+Math.random()*maxDh);
      h=Math.max(65+safeBot,Math.min(H*0.3,h+dh));
    }
  } else if(score<100){
    // Gentle steps
    const stepC=Math.min(0.2,0.04+(score-40)*0.002);
    if(Math.random()<stepC){
      const maxDh=Math.min(18,5+(score-40)*0.2);
      const dh=(Math.random()<0.5?1:-1)*(3+Math.random()*maxDh);
      h=Math.max(65+safeBot,Math.min(H*0.33,h+dh));
    }
  } else if(score<200){
    // Moderate steps
    const stepC=Math.min(0.3,0.08+(score-100)*0.002);
    if(Math.random()<stepC){
      const maxDh=Math.min(30,8+(score-100)*0.15);
      const dh=(Math.random()<0.5?1:-1)*(4+Math.random()*maxDh);
      h=Math.max(65+safeBot,Math.min(H*0.35,h+dh));
    }
  } else {
    // Full difficulty
    const stepC=Math.min(0.4,0.12+(score-200)*0.002);
    if(Math.random()<stepC){
      const maxDh=Math.min(45,12+score*0.1);
      const dh=(Math.random()<0.5?1:-1)*(5+Math.random()*maxDh);
      h=Math.max(65+safeBot,Math.min(H*0.38,h+dh));
    }
  }
  // Width: wider early, very gradually narrower
  let w;
  if(score<25)w=220+Math.random()*280;
  else if(score<60)w=180+Math.random()*200;
  else if(score<120)w=130+Math.random()*160;
  else if(score<200)w=90+Math.random()*110;
  else w=55+Math.random()*75;
  arr.push({x:lastRight+gap,w:w,h:h});
}

function floorSurfaceY(px){
  for(let i=0;i<terrainFloor.length-1;i++){
    const s=terrainFloor[i],n=terrainFloor[i+1];
    if(px>=s.x&&px<n.x){const t=(px-s.x)/(n.x-s.x);return H-s.h-(n.h-s.h)*t;}
  }
  return H+200; // void (gap)
}
function ceilSurfaceY(px){
  for(let i=0;i<terrainCeil.length-1;i++){
    const s=terrainCeil[i],n=terrainCeil[i+1];

  }
  return -200; // void
}

      // Walker/Patrol (type 0)

  const rand=stageRng||Math.random;
  if(rand()<0.35){

    if(player.gDir===1||rand()<0.5){
      for(let i=0;i<2+Math.floor(rand()*3);i++)
        coins.push({x:cx+i*28,y:fy-40-rand()*30,sz:9,col:false,p:rand()*6.28});

        coins.push({x:cx+i*28,y:csy+40+rand()*30,sz:9,col:false,p:rand()*6.28});
    }
  } else {
    coinCD=20+Math.floor(Math.random()*15); // longer no-spawn cooldown (was 12+8)
  }
}
function trySpawnItem(){
  const edge=terrainFloor[terrainFloor.length-1];
  if(!edge)return;if(edge.x-lastItemX<350)return;
  const rand=stageRng||Math.random;

// Types: 0=左右パトロール, 1=砲台(水平砲弾), 2=空中飛行
function trySpawnEnemy(){
  if(enemyCD>0){enemyCD--;return;}
  if(score<30)return; // enemies appear later
  if(bossPhase.active)return; // no normal enemies during boss
  const plat=findEdgeSpawnPlat();
  if(!plat)return;
  const chance=Math.min(0.3,0.04+(score-30)*0.002);
  if(Math.random()<chance){
    enemyCD=55+Math.floor(Math.random()*50);
    const ex=Math.max(W+13,plat.x);
    const sz=13;
    // Choose enemy type based on score - early game = walkers only
    let eType=0;
    const tr=Math.random();
    if(score>=200&&bossPhase.bossCount>=1&&tr<0.15) eType=3; // bomber (after boss)
    else if(score>=160&&tr<0.12) eType=5; // phantom (mid-late)
    else if(score>=140&&tr<0.15) eType=4; // vertical mover (mid-late)
    else if(score>=120&&tr<0.22) eType=2; // flyer (mid-late)
    else if(score>=80&&tr<0.35) eType=1; // cannon (mid)
    else eType=0; // walker/patrol (always available)

    if(eType===4){
      // Vertical mover: bounces between floor and ceiling
      const surfY=H-plat.h;
      const sz=14;
      enemies.push({x:ex,y:surfY-sz,vy:-2.5-Math.random()*1.5,gDir:1,walkSpd:0,sz:sz,alive:true,fr:Math.random()*100,type:4,shootT:999,
        moveDir:-1,moveSpd:2.5+Math.random()*1.5,pauseT:0});
    } else if(eType===5){
      // Phantom: floats in air, periodically becomes invisible
      const surfY=H-plat.h;
      const flyY=surfY-50-Math.random()*60;
      const sz=13;
      enemies.push({x:ex,y:flyY,vy:0,gDir:1,walkSpd:0,sz:sz,alive:true,fr:Math.random()*100,type:5,shootT:999,
        baseY:flyY,flyPhase:Math.random()*6.28,flyAmp:15+Math.random()*15,
        visTimer:0,visCycle:90+Math.floor(Math.random()*60),visible:true,fadeT:0});
    } else if(eType===2){
      // Flying enemy: spawns in the air between floor and ceiling
      const surfY=H-plat.h;
      const flyY=surfY-60-Math.random()*80;
      enemies.push({x:ex,y:flyY,vy:0,gDir:1,walkSpd:0,sz:sz,alive:true,fr:Math.random()*100,type:2,shootT:999,
        baseY:flyY,flyPhase:Math.random()*6.28,flyAmp:20+Math.random()*25});
    } else if(eType===3){
      // Bomber (Hammer Bros style): stationary, throws bombs in an arc
      const surfY=H-plat.h;
      enemies.push({x:ex,y:surfY-sz,vy:0,gDir:1,walkSpd:0.1,sz:sz+2,alive:true,fr:Math.random()*100,type:3,
        shootT:90+Math.floor(Math.random()*40),bombCD:90+Math.floor(Math.random()*40),
        patrolDir:1,patrolOriginX:ex,patrolRange:15+Math.random()*20});
    } else {
      const onCeil=Math.random()<0.3;
      const gd=onCeil?-1:1;
      const surfY=gd===1?H-plat.h:ceilSurfaceY(ex);
      if(eType===0){
        // Walker with left-right patrol
        enemies.push({x:ex,y:gd===1?surfY-sz:surfY+sz,vy:0,gDir:gd,walkSpd:0.3+Math.random()*0.4,sz:sz,alive:true,fr:Math.random()*100,type:0,shootT:999,
          patrolDir:1,patrolOriginX:ex,patrolRange:30+Math.random()*40});
      } else {
        // Cannon (shooter) - stationary
        enemies.push({x:ex,y:gd===1?surfY-sz:surfY+sz,vy:0,gDir:gd,walkSpd:0.15+Math.random()*0.2,sz:sz,alive:true,fr:Math.random()*100,type:1,shootT:60+Math.floor(Math.random()*60)});
      }
    }
  } else {
    enemyCD=15+Math.floor(Math.random()*10);
  }
}

// ===== FLOATING MID-AIR PLATFORMS =====
function trySpawnFloatPlat(){
  if(floatCD>0){floatCD--;return;}
  if(score<100)return; // appear after more progression
  if(bossPhase.active)return;
  const plat=findEdgeSpawnPlat();
  if(!plat)return;
  const chance=Math.min(0.18,0.04+(score-35)*0.002);
  if(Math.random()<chance){
    floatCD=80+Math.floor(Math.random()*60);
    const fx=Math.max(W+20,plat.x);
    const fw=50+Math.random()*60; // width: 50-110px
    const floorY=H-plat.h;
    const ceilY=ceilSurfaceY(fx);
    const gap=floorY-ceilY;
    if(gap<120)return; // not enough room
    // Place at a height reachable by jumping from the floor
    // Max jump height ≈ JUMP_POWER^2 / (2*GRAVITY) ≈ 145px
    const maxJumpH=JUMP_POWER*JUMP_POWER/(2*GRAVITY)*0.75; // ~109px (comfortable reach)
    const fy=floorY-maxJumpH*(0.5+Math.random()*0.5); // 50-100% of comfortable jump height
    floatPlats.push({x:fx,y:fy,w:fw,th:10});
    // Sometimes spawn an item on the floating platform
    if(Math.random()<0.4){
      const pool=[1,2]; // magnet or double jump
      if(hp<maxHp()&&Math.random()<0.3) pool.push(3); // heart if damaged
      const it=pool[Math.floor(Math.random()*pool.length)];
      items.push({x:fx+fw/2,y:fy-25,t:it,sz:14,p:Math.random()*6.28,col:false});
    }
    // Sometimes spawn coins in an arc above
    if(Math.random()<0.5){
      for(let i=0;i<3;i++){
        coins.push({x:fx+10+i*(fw-20)/2,y:fy-30-Math.sin(i/2*Math.PI)*15,sz:9,col:false,p:0});
      }
    }
  } else {
    floatCD=20+Math.floor(Math.random()*15);
  }
}

// ===== BOSS PHASE =====
function startBossPhase(){
  bossPhase.active=true;
  bossPhase.prepare=120;
  bossPhase.alertT=0;
  bossPhase.enemies=[];
  bossPhase.defeated=0;
  bossPhase.reward=false;
  bossPhase.rewardT=0;
  bossPhase.chargeQueue=[]; // queue of charge enemies to spawn
  bossPhase.chargeIdx=0;
  bossPhase.bruiser=null; // the multi-stomp boss
  bossPhase.wizard=null; // the teleporting wizard boss
  enemies=[];bullets=[];floatPlats=[];spikes=[];movingHills=[];
  bossPhase.bossCount++;
  bossPhase.lastBossScore=score;
  bossPhase.nextAt=score+800+bossPhase.bossCount*100;
  shakeI=18;sfxBossAlert();vibrate([50,30,50,30,80,40,100]);
}
function spawnBossEnemies(){
  const bc=bossPhase.bossCount; // 1-based count of boss fights
  const floorY=H-GROUND_H;
  const ceilY=GROUND_H;
  bossPhase.chargeQueue=[];
  bossPhase.chargeIdx=0;
  bossPhase.bruiser=null;
  bossPhase.wizard=null;
  // Randomly choose boss type: charge, bruiser, or wizard (3rd type from bc>=2)
  const roll=Math.random();
  const bossType=bc>=2&&roll<0.33?'wizard':roll<(bc>=2?0.66:0.5)?'bruiser':'charge';
  if(bossType==='charge'){
    // Charge type: 5x player size, stompable, speed scales with bossCount
    const chargeCount=5+Math.min(bc-1,3);
    const baseSpd=3+Math.min(bc-1,5)*0.35;
    const spdVariance=Math.min(bc-1,4)*0.6;
    for(let i=0;i<chargeCount;i++){
      const fromCeil=Math.random()<0.5;
      const gDir=fromCeil?-1:1;
      const sy=gDir===1?floorY:ceilY;
      const sz=PLAYER_R*5;
      const ey=gDir===1?sy-sz:sy+sz;
      // From 2nd encounter: some charge diagonally (cross from floor to ceiling or vice versa)
      const diagVy=bc>=2&&Math.random()<0.4?(gDir===1?-2-Math.random()*1.5:2+Math.random()*1.5):0;
      bossPhase.chargeQueue.push({
        x:W+80+i*10,y:ey,vy:0,gDir:gDir,sz:sz,alive:true,fr:Math.random()*100,
        type:10,shootT:999,boss:true,bossType:'charge',
        chargeVx:-(baseSpd+Math.random()*(1.5+spdVariance)),
        diagVy:diagVy,
        chargeState:'wait',
        rushDelay:30+Math.floor(Math.random()*90),
        timer:0
      });
    }
    bossPhase.total=chargeCount;
  } else if(bossType==='bruiser'){
    // Bruiser type: 2x previous size, always 3 stomps, from 2nd encounter moves between floor/ceiling
    const bsz=(30+Math.min(bc-1,3)*3)*2;
    const bruiser={
      x:W+80,y:floorY-bsz,vy:0,gDir:1,sz:bsz,alive:true,fr:0,
      type:11,shootT:999,boss:true,bossType:'bruiser',
      hp:3, maxHp:3,
      chargeVx:-(3.5+Math.min(bc-1,6)*0.4), retreatVx:2.5+Math.min(bc-1,4)*0.2,
      state:'enter',
      timer:0, stunT:0, hurtFlash:0, invT:0, feinted:false,
      flipEnabled:bc>=2, // from 2nd encounter: can move between floor and ceiling
      patrolDir:1,patrolOriginX:W*0.6,patrolRange:0
    };
    bossPhase.bruiser=bruiser;
    bossPhase.total=1;
  } else {
    // Wizard type: teleports, shoots patterns, vulnerable during cast
    const wsz=24+Math.min(bc-1,3)*2;
    const wizard={
      x:W+60,y:H/2,vy:0,gDir:1,sz:wsz,alive:true,fr:0,
      type:12,shootT:999,boss:true,bossType:'wizard',
      hp:3,maxHp:3,
      state:'enter',timer:0,hurtFlash:0,invT:0,
      castT:0,castType:0, // 0=ring, 1=wave
      teleportT:0,teleportTarget:{x:0,y:0},
      alpha:1
    };
    bossPhase.wizard=wizard;
    bossPhase.total=1;
  }
}
function updateBossPhase(){
  if(!bossPhase.active)return;
  bossPhase.alertT++;
  if(bossPhase.prepare>0){
    bossPhase.prepare--;
    if(bossPhase.prepare%4===0){
      for(let i=0;i<3;i++){
        const side=Math.random()<0.5?-10:W+10;
        parts.push({x:side,y:Math.random()*H,vx:side<0?3:-3,vy:(Math.random()-0.5)*2,life:40,ml:40,sz:Math.random()*4+2,col:['#ff3860','#ff0040','#cc0030'][i%3]});
      }
    }
    if(bossPhase.prepare===0) spawnBossEnemies();
    return;
  }
  if(bossPhase.reward){
    bossPhase.rewardT++;
    if(bossPhase.rewardT>=180){bossPhase.active=false;bossPhase.reward=false;}
    return;
  }
  const floorY=H-GROUND_H;
  const ceilY=GROUND_H;
  const pr=PLAYER_R*ct().sizeMul;
  // Phase A: spawn charge enemies from queue
  if(bossPhase.chargeIdx<bossPhase.chargeQueue.length){
    const next=bossPhase.chargeQueue[bossPhase.chargeIdx];
    next.rushDelay--;
    if(next.rushDelay<=0){
      next.chargeState='rush';
      enemies.push(next);
      bossPhase.enemies.push(next);
      bossPhase.chargeIdx++;
      sfx('shoot');shakeI=4;
    }
  }
  // Update charge enemies
  enemies.forEach(en=>{
    if(!en.alive||en.bossType!=='charge')return;
    if(en.chargeState==='rush'){
      en.x+=en.chargeVx;
      // Diagonal movement (from 2nd encounter)
      if(en.diagVy){
        en.y+=en.diagVy;
        // Clamp within arena
        if(en.y-en.sz<ceilY)en.y=ceilY+en.sz;
        if(en.y+en.sz>floorY)en.y=floorY-en.sz;
      }
      en.fr+=0.2;
      // Trail particles
      if(frame%2===0){
        const tc2=en.gDir===1?'#ff4444':'#4444ff';
        parts.push({x:en.x+en.sz,y:en.y,vx:1+Math.random(),vy:(Math.random()-0.5)*2,life:12,ml:12,sz:Math.random()*4+2,col:tc2});
      }
      // If went off left edge: dodged successfully = defeated
      if(en.x<-en.sz*2){
        en.alive=false;
        addPop(40,en.y,'\u56DE\u907F!','#34d399');
        emitParts(10,en.y,8,'#34d399',3,2);
      }
      // Collision with player
      const dx=player.x-en.x,dy=player.y-en.y;
      if(Math.sqrt(dx*dx+dy*dy)<pr+en.sz){
        if(itemEff.invincible>0){
          en.alive=false;
          emitParts(en.x,en.y,15,'#ff00ff',4,3);sfx('stomp');shakeI=4;
        } else {
          // Stomp check: stricter - player must be clearly above/below enemy top
          const stomped=en.gDir===1
            ?(player.y+pr<en.y-en.sz*0.15&&player.vy>=0)
            :(player.y-pr>en.y+en.sz*0.15&&player.vy<=0);
          if(stomped){
            en.alive=false;
            player.vy=en.gDir===1?-JUMP_POWER*0.8:JUMP_POWER*0.8;
            player.grounded=false;flipCount=0;player.canFlip=true;djumpUsed=false;
            shakeI=8;sfx('gstomp');vibrate([15,10,20]);
            addPop(en.x,en.y-en.sz*en.gDir,'\u6483\u7834!','#ffd700');
            emitParts(en.x,en.y,15,'#ffd700',6,3);
          } else {
            hurt();
            en.alive=false;
          }
        }
      }
    }
  });
  // Phase B: bruiser logic (enters immediately if no charges, or after charges cleared)
  const chargesCleared=bossPhase.chargeQueue.length===0||(bossPhase.chargeIdx>=bossPhase.chargeQueue.length&&
    bossPhase.enemies.filter(e=>e.bossType==='charge'&&e.alive).length===0);
  if(chargesCleared&&bossPhase.bruiser&&bossPhase.bruiser.alive){
    const b=bossPhase.bruiser;
    const bc=bossPhase.bossCount;
    if(!enemies.includes(b)){
      enemies.push(b);bossPhase.enemies.push(b);
    }
    b.timer++;b.fr+=0.1;
    if(b.hurtFlash>0)b.hurtFlash--;
    if(b.invT>0)b.invT--;
    if(b.state==='enter'){
      b.x+=b.chargeVx*0.5;
      if(b.x<=W*0.7){b.state='charge';b.timer=0;b.feinted=false;}
    } else if(b.state==='charge'){
      b.x+=b.chargeVx;
      b.fr+=0.15;
      if(frame%2===0)parts.push({x:b.x+b.sz,y:b.y,vx:2,vy:(Math.random()-0.5)*1.5,life:15,ml:15,sz:Math.random()*5+2,col:'#ff3860'});
      // Feint: at higher boss counts, sometimes fake charge then retreat
      if(bc>=2&&b.timer>15&&b.timer<50&&!b.feinted&&Math.random()<0.004*bc){
        b.state='feint';b.feintT=25;b.timer=0;b.feinted=true;
      }
      if(b.x<W*0.15){b.state='retreat';b.timer=0;}
    } else if(b.state==='feint'){
      // Quick retreat (fake-out)
      b.x+=b.retreatVx*1.8;
      b.feintT--;
      if(frame%3===0)parts.push({x:b.x-b.sz*0.3,y:b.y,vx:-1,vy:(Math.random()-0.5),life:10,ml:10,sz:Math.random()*3+1,col:'#ffaa00'});
      if(b.feintT<=0){b.state='charge';b.timer=0;}
    } else if(b.state==='invincible'){
      // Blinking invincible after being stomped, slowly retreating
      b.invT--;
      b.x+=b.retreatVx*0.6;
      if(b.invT<=0){b.state='retreat';b.timer=0;}
    } else if(b.state==='retreat'){
      b.x+=b.retreatVx;
      if(b.x>=W*0.7){
        // From 2nd encounter: sometimes flip to other surface when re-engaging
        if(b.flipEnabled&&Math.random()<0.4){
          b.gDir*=-1;
        }
        b.state='charge';b.timer=0;b.feinted=false;
      }
    }
    // Collision check (skip during invincible state)
    if(b.invT<=0){
      const dx=player.x-b.x,dy=player.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<pr+b.sz){
        if(itemEff.invincible>0){
          b.hp--;b.hurtFlash=20;b.invT=60;b.state='invincible';b.timer=0;
          shakeI=8;sfx('stomp');
          emitParts(b.x,b.y,15,'#ff00ff',4,3);
          if(b.hp<=0){bossBruiserDefeat(b);}
        } else {
          // Stomp check: stricter - player must be well above bruiser top (gDir-aware)
          const stomped=b.gDir===1
            ?(player.y+pr<b.y-b.sz*0.15&&player.vy>=0&&player.gDir===1)
            :(player.y-pr>b.y+b.sz*0.15&&player.vy<=0&&player.gDir===-1);
          if(stomped){
            b.hp--;b.hurtFlash=20;
            b.state='invincible';b.invT=60;b.timer=0;
            player.vy=b.gDir===1?-JUMP_POWER*0.8:JUMP_POWER*0.8;player.grounded=false;
            flipCount=0;player.canFlip=true;djumpUsed=false;
            shakeI=12;sfx('gstomp');vibrate([20,10,30]);
            addPop(b.x,b.y-b.sz*b.gDir-10,'HP '+b.hp+'/'+b.maxHp,'#ff3860');
            emitParts(b.x,b.y-b.sz*b.gDir,12,'#ff3860',5,3);
            if(b.hp<=0){bossBruiserDefeat(b);}
          } else {
            hurt();
          }
        }
      }
    }
    // Keep on correct surface (floor or ceiling based on gDir)
    if(b.gDir===1){
      const sy=floorSurfaceY(b.x);
      if(sy<H+100)b.y=sy-b.sz;
    } else {
      const sy=ceilSurfaceY(b.x);
      if(sy>-100)b.y=sy+b.sz;
    }
  }
  // Phase C: wizard boss logic
  const wizardActive=bossPhase.wizard&&bossPhase.wizard.alive;
  if(chargesCleared&&wizardActive){
    const w=bossPhase.wizard;
    if(!enemies.includes(w)){
      enemies.push(w);bossPhase.enemies.push(w);
    }
    w.timer++;w.fr+=0.1;
    if(w.hurtFlash>0)w.hurtFlash--;
    if(w.invT>0)w.invT--;
    if(w.state==='enter'){
      w.x-=2;w.alpha=Math.min(1,w.alpha+0.02);
      if(w.x<=W*0.7){w.state='idle';w.timer=0;}
    } else if(w.state==='idle'){
      // Hover in place, preparing to cast
      w.y+=Math.sin(w.fr*0.5)*0.5;
      if(w.timer>=50){w.state='cast';w.timer=0;w.castType=Math.floor(Math.random()*2);w.castT=0;}
    } else if(w.state==='cast'){
      // Casting animation - VULNERABLE to stomp during cast
      w.castT++;
      w.y+=Math.sin(w.fr)*0.3;
      if(w.castT===30){
        // Fire projectiles
        if(w.castType===0){
          // Ring of 8 bullets
          for(let i=0;i<8;i++){
            const a=i*Math.PI/4;
            bullets.push({x:w.x,y:w.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,sz:5,life:120,wizBullet:true});
          }
        } else {
          // 3 aimed shots toward player
          for(let i=-1;i<=1;i++){
            const dx=player.x-w.x,dy=player.y-w.y;
            const d=Math.sqrt(dx*dx+dy*dy)||1;
            const spd=3.5;
            const spread=i*0.3;
            bullets.push({x:w.x,y:w.y,vx:dx/d*spd+Math.cos(Math.atan2(dy,dx)+Math.PI/2)*spread*spd,
              vy:dy/d*spd+Math.sin(Math.atan2(dy,dx)+Math.PI/2)*spread*spd,sz:6,life:100,wizBullet:true});
          }
        }
        sfx('shoot');
      }
      if(w.castT>=50){w.state='teleport';w.timer=0;w.teleportT=0;
        // Pick random target position in arena
        w.teleportTarget={x:W*0.3+Math.random()*W*0.5,y:GROUND_H+40+Math.random()*(H-GROUND_H*2-80)};
      }
    } else if(w.state==='teleport'){
      w.teleportT++;
      w.alpha=Math.max(0,1-w.teleportT/15);
      if(w.teleportT>=15){
        w.x=w.teleportTarget.x;w.y=w.teleportTarget.y;
        w.state='appear';w.timer=0;w.teleportT=0;
      }
    } else if(w.state==='appear'){
      w.teleportT++;
      w.alpha=Math.min(1,w.teleportT/15);
      if(w.teleportT>=15){w.state='idle';w.timer=0;}
    }
    // Collision (skip during invincible or teleporting)
    if(w.invT<=0&&w.alpha>0.5){
      const dx=player.x-w.x,dy=player.y-w.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<pr+w.sz){
        if(itemEff.invincible>0){
          w.hp--;w.hurtFlash=20;w.invT=60;w.state='teleport';w.timer=0;w.teleportT=0;
          w.teleportTarget={x:W*0.3+Math.random()*W*0.5,y:GROUND_H+40+Math.random()*(H-GROUND_H*2-80)};
          shakeI=8;sfx('stomp');emitParts(w.x,w.y,15,'#ff00ff',4,3);
          if(w.hp<=0){bossWizardDefeat(w);}
        } else {
          // Stomp: only during cast state (vulnerable), player above
          const stomped=w.state==='cast'&&player.y+pr<w.y-w.sz*0.2&&player.vy>=0;
          if(stomped){
            w.hp--;w.hurtFlash=20;w.invT=60;
            w.state='teleport';w.timer=0;w.teleportT=0;
            w.teleportTarget={x:W*0.3+Math.random()*W*0.5,y:GROUND_H+40+Math.random()*(H-GROUND_H*2-80)};
            player.vy=-JUMP_POWER*0.8;player.grounded=false;
            flipCount=0;player.canFlip=true;djumpUsed=false;
            shakeI=12;sfx('gstomp');vibrate([20,10,30]);
            addPop(w.x,w.y-w.sz-10,'HP '+w.hp+'/'+w.maxHp,'#aa44ff');
            emitParts(w.x,w.y-w.sz,12,'#aa44ff',5,3);
            if(w.hp<=0){bossWizardDefeat(w);}
          } else {
            hurt();
          }
        }
      }
    }
  }

  // Check victory
  bossPhase.defeated=0;
  for(let i=0;i<bossPhase.enemies.length;i++){
    if(!bossPhase.enemies[i].alive)bossPhase.defeated++;
  }
  const bruiserDone=!bossPhase.bruiser||!bossPhase.bruiser.alive;
  const wizardDone=!bossPhase.wizard||!bossPhase.wizard.alive;
  const allDone=chargesCleared&&bruiserDone&&wizardDone;
  if(allDone&&bossPhase.enemies.length>0&&!bossPhase.reward){
    bossPhase.reward=true;bossPhase.rewardT=0;
    sfxFanfare();shakeI=10;vibrate([30,20,30,20,60]);
    addPop(W/2,H*0.3,'BOSS \u6483\u7834\uFF01','#ffd700');
    itemEff.invincible=600;switchBGM('fever');
    if(hp<maxHp()){hp++;addPop(player.x,player.y-40,'HP +1','#ff3860');}
    const bonus=30+bossPhase.total*5;
    walletCoins+=bonus;localStorage.setItem('gd5wallet',walletCoins.toString());
    totalCoins+=bonus;
    addPop(W/2,H*0.45,'+'+bonus+' \u30B3\u30A4\u30F3\uFF01','#ffd700');
    for(let i=0;i<40;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*4,vy:1+Math.random()*4,life:80+Math.random()*40,ml:120,sz:Math.random()*5+3,col:['#ffd700','#ffaa00','#fff4b0'][i%3]});
  }
}

}

// === Boss enemy draw: wizard type ===
function drawBossWizard(en){
  const s=en.sz,t=en.fr;
  const dmg=en.maxHp-en.hp;
  ctx.save();ctx.translate(en.x,en.y);
  ctx.globalAlpha=en.alpha||1;
  if(en.invT>0&&en.invT%6<3)ctx.globalAlpha*=0.25;
  if(en.hurtFlash>0&&en.hurtFlash%4<2)ctx.globalAlpha*=0.5;
  // Floating shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,s*1.2,s*0.6,s*0.12,0,0,6.28);ctx.fill();
  // Robe body (dark purple with flowing bottom)
  const robeGr=ctx.createLinearGradient(0,-s,0,s);
  robeGr.addColorStop(0,dmg>=2?'#2a0a3a':'#4a1a6a');
  robeGr.addColorStop(1,dmg>=2?'#1a0520':'#2a0a40');
  ctx.fillStyle=robeGr;
  ctx.beginPath();
  ctx.moveTo(-s*0.6,-s*0.3);
  ctx.quadraticCurveTo(-s*0.8,-s*0.8,0,-s);
  ctx.quadraticCurveTo(s*0.8,-s*0.8,s*0.6,-s*0.3);
  ctx.lineTo(s*0.7+Math.sin(t*0.5)*s*0.1,s*0.8);
  ctx.quadraticCurveTo(s*0.3,s*0.6+Math.sin(t*0.7)*s*0.1,0,s*0.9+Math.sin(t*0.6)*s*0.08);
  ctx.quadraticCurveTo(-s*0.3,s*0.6-Math.sin(t*0.7)*s*0.1,-s*0.7-Math.sin(t*0.5)*s*0.1,s*0.8);
  ctx.closePath();ctx.fill();
  // Hat/hood point
  ctx.fillStyle=dmg>=2?'#3a1050':'#5a2a8a';
  ctx.beginPath();
  ctx.moveTo(-s*0.3,-s*0.85);ctx.lineTo(0,-s*1.5-Math.sin(t*0.4)*s*0.1);ctx.lineTo(s*0.3,-s*0.85);
  ctx.closePath();ctx.fill();
  // Star on hat
  ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=6;
  ctx.font=(s*0.3)+'px monospace';ctx.textAlign='center';
  ctx.fillText('\u2605',0,-s*1.1);ctx.shadowBlur=0;
  // Glowing eyes
  ctx.fillStyle='#ff44ff';ctx.shadowColor='#ff44ff';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(-s*0.2,-s*0.45,s*0.12,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(s*0.2,-s*0.45,s*0.12,0,6.28);ctx.fill();
  ctx.shadowBlur=0;
  // Staff/wand (glows during cast)
  ctx.strokeStyle=en.state==='cast'?'#ffd700':'#8844aa';
  ctx.lineWidth=s*0.08;
  ctx.beginPath();ctx.moveTo(s*0.5,-s*0.2);ctx.lineTo(s*0.8,s*0.7);ctx.stroke();
  // Staff orb
  const orbGlow=en.state==='cast'?0.8+Math.sin(t*2)*0.2:0.3;
  ctx.fillStyle=`rgba(170,68,255,${orbGlow})`;ctx.shadowColor='#aa44ff';ctx.shadowBlur=en.state==='cast'?15:5;
  ctx.beginPath();ctx.arc(s*0.5,-s*0.25,s*0.12,0,6.28);ctx.fill();ctx.shadowBlur=0;
  // Casting circle (only during cast state)
  if(en.state==='cast'){
    ctx.strokeStyle='rgba(170,68,255,'+0.4*Math.abs(Math.sin(t))+')';
    ctx.lineWidth=1.5;
    const cr=s*1.5+Math.sin(t*2)*s*0.2;
    ctx.beginPath();ctx.arc(0,0,cr,0,6.28);ctx.stroke();
    // Rotating runes
    for(let i=0;i<4;i++){
      const ra=t*0.5+i*Math.PI/2;
      ctx.fillStyle='rgba(255,200,255,0.5)';ctx.font=(s*0.2)+'px monospace';
      ctx.fillText('\u2726',Math.cos(ra)*cr,Math.sin(ra)*cr);
    }
  }
  // Damage cracks
  if(dmg>=1){
    ctx.strokeStyle='rgba(255,100,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-s*0.2,0);ctx.lineTo(s*0.1,s*0.3);ctx.stroke();
  }
  if(dmg>=2){
    ctx.strokeStyle='rgba(255,100,100,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(s*0.1,-s*0.3);ctx.lineTo(-s*0.1,s*0.1);ctx.lineTo(s*0.2,s*0.4);ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}
// === Boss enemy draw: charge type ===
function drawBossCharge(en){
  const s=en.sz,flip=en.gDir;
  ctx.save();ctx.translate(en.x,en.y);
  if(flip===-1)ctx.scale(1,-1);
  // Armored rhino shape - dark metallic
  const gr=ctx.createRadialGradient(-s*0.1,0,s*0.1,-s*0.1,0,s);
  gr.addColorStop(0,'#6a7a8a');gr.addColorStop(0.6,'#3a4a5a');gr.addColorStop(1,'#1a2a3a');
  ctx.fillStyle=gr;
  // Main body (angular armored shape)
  ctx.beginPath();
  ctx.moveTo(-s*0.9,-s*0.5);ctx.lineTo(-s*0.3,-s*0.8);ctx.lineTo(s*0.4,-s*0.7);
  ctx.lineTo(s*0.8,-s*0.3);ctx.lineTo(s*0.9,s*0.1);ctx.lineTo(s*0.6,s*0.6);
  ctx.lineTo(-s*0.2,s*0.7);ctx.lineTo(-s*0.8,s*0.5);ctx.lineTo(-s*1.0,0);
  ctx.closePath();ctx.fill();
  // Horn/spike
  ctx.fillStyle='#c0d0e0';
  ctx.beginPath();ctx.moveTo(-s*1.0,-s*0.1);ctx.lineTo(-s*1.5,0);ctx.lineTo(-s*1.0,s*0.1);ctx.closePath();ctx.fill();
  // Armor plates (chevron lines)
  ctx.strokeStyle='#8090a0';ctx.lineWidth=Math.max(1.5,s*0.04);
  ctx.beginPath();ctx.moveTo(-s*0.2,-s*0.6);ctx.lineTo(s*0.1,-s*0.2);ctx.lineTo(-s*0.2,s*0.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*0.2,-s*0.5);ctx.lineTo(s*0.5,-s*0.1);ctx.lineTo(s*0.2,s*0.3);ctx.stroke();
  // Second armor layer (visible at larger sizes)
  if(s>40){
    ctx.strokeStyle='#6a7a8a';ctx.lineWidth=s*0.02;
    ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.4);ctx.lineTo(-s*0.1,0);ctx.lineTo(-s*0.5,s*0.4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.5,-s*0.35);ctx.lineTo(s*0.7,0);ctx.lineTo(s*0.5,s*0.35);ctx.stroke();
    // Extra spikes
    ctx.fillStyle='#c0d0e0';
    ctx.beginPath();ctx.moveTo(-s*0.3,-s*0.8);ctx.lineTo(-s*0.4,-s*1.0);ctx.lineTo(-s*0.2,-s*0.75);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(s*0.4,-s*0.7);ctx.lineTo(s*0.5,-s*0.95);ctx.lineTo(s*0.3,-s*0.65);ctx.closePath();ctx.fill();
  }
  // Glowing red eye
  ctx.fillStyle='#ff0000';ctx.shadowColor='#ff0000';ctx.shadowBlur=Math.max(8,s*0.15);
  ctx.beginPath();ctx.arc(-s*0.5,-s*0.2,s*0.12,0,6.28);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-s*0.52,-s*0.22,s*0.04,0,6.28);ctx.fill();
  ctx.shadowBlur=0;
  // Speed lines when rushing
  ctx.strokeStyle='rgba(255,100,100,0.4)';ctx.lineWidth=Math.max(1,s*0.03);
  const lineCount=s>40?5:3;
  for(let i=0;i<lineCount;i++){
    const ly=-s*0.4+i*s*0.8/lineCount;
    ctx.beginPath();ctx.moveTo(s*0.5,ly);ctx.lineTo(s*1.2+Math.random()*s*0.5,ly);ctx.stroke();
  }
  // Exhaust particles from back
  ctx.fillStyle='rgba(255,80,40,0.3)';
  const exhaustCount=s>40?4:2;
  for(let i=0;i<exhaustCount;i++){
    const px=s*0.7+Math.random()*s*0.4,py=(Math.random()-0.5)*s*0.5;
    ctx.beginPath();ctx.arc(px,py,s*0.1+Math.random()*s*0.1,0,6.28);ctx.fill();
  }
  ctx.restore();
}
// === Boss enemy draw: bruiser type (multi-stomp) ===
function drawBossBruiser(en){

  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,s*0.9,s*0.8,s*0.15,0,0,6.28);ctx.fill();

  ctx.fillRect(s*0.2-legPhase,s*0.7,s*0.35,s*0.2);
  // Main body (large armored torso)
  const bodyGr=ctx.createRadialGradient(0,-s*0.1,s*0.1,0,-s*0.1,s*0.9);
  if(dmg>=2){bodyGr.addColorStop(0,'#4a1a3a');bodyGr.addColorStop(0.5,'#2a0a2a');bodyGr.addColorStop(1,'#1a0518');}
  else if(dmg>=1){bodyGr.addColorStop(0,'#5a2a5a');bodyGr.addColorStop(0.5,'#3a1040');bodyGr.addColorStop(1,'#200828');}
  else{bodyGr.addColorStop(0,'#7a3a8a');bodyGr.addColorStop(0.5,'#4a1a5a');bodyGr.addColorStop(1,'#2a0a3a');}
  ctx.fillStyle=bodyGr;
  ctx.beginPath();
  ctx.moveTo(-s*0.7,-s*0.6);ctx.quadraticCurveTo(-s*0.9,-s*0.1,-s*0.7,s*0.4);
  ctx.lineTo(s*0.7,s*0.4);ctx.quadraticCurveTo(s*0.9,-s*0.1,s*0.7,-s*0.6);
  ctx.quadraticCurveTo(0,-s*0.8,-s*0.7,-s*0.6);
  ctx.closePath();ctx.fill();
  // Cracks overlay based on damage
  if(dmg>=1){
    ctx.strokeStyle='rgba(200,100,255,0.5)';ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-s*0.3,-s*0.5);ctx.lineTo(-s*0.1,-s*0.2);ctx.lineTo(-s*0.25,s*0.1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.2,-s*0.4);ctx.lineTo(s*0.35,-s*0.1);ctx.stroke();
  }
  if(dmg>=2){
    ctx.strokeStyle='rgba(255,50,100,0.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.3);ctx.lineTo(-s*0.2,0);ctx.lineTo(-s*0.4,s*0.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.1,-s*0.55);ctx.lineTo(s*0.3,-s*0.2);ctx.lineTo(s*0.5,s*0.1);ctx.stroke();
    // Exposed inner glow through cracks
    ctx.fillStyle='rgba(255,0,128,0.15)';
    ctx.beginPath();ctx.arc(-s*0.2,-s*0.1,s*0.15,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(s*0.3,-s*0.2,s*0.1,0,6.28);ctx.fill();
    // Sparks from damage
    if(Math.random()<0.3){
      const spx=(Math.random()-0.5)*s*0.8,spy=-s*0.3+Math.random()*s*0.5;
      ctx.fillStyle='#ff00ff';ctx.beginPath();ctx.arc(spx,spy,s*0.04+Math.random()*s*0.03,0,6.28);ctx.fill();
    }
  }
  // Chest armor plate (breaks progressively)
  if(dmg<2){
    ctx.fillStyle=dmg>=1?'#4a1a4a':'#6a2a7a';
    ctx.beginPath();
    ctx.moveTo(-s*0.4,-s*0.5);ctx.lineTo(0,-s*0.65);ctx.lineTo(s*0.4,-s*0.5);
    ctx.lineTo(s*0.35,s*0.15);ctx.lineTo(0,s*0.25);ctx.lineTo(-s*0.35,s*0.15);
    ctx.closePath();ctx.fill();
  } else {
    // Broken chest plate - only fragments remain
    ctx.fillStyle='#3a1030';
    ctx.beginPath();ctx.moveTo(-s*0.3,-s*0.45);ctx.lineTo(-s*0.1,-s*0.55);ctx.lineTo(s*0.1,-s*0.4);ctx.lineTo(-s*0.2,s*0.05);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(s*0.15,-s*0.45);ctx.lineTo(s*0.35,-s*0.35);ctx.lineTo(s*0.25,s*0.1);ctx.lineTo(s*0.05,-s*0.1);ctx.closePath();ctx.fill();
  }
  // Glowing core (shows HP, flickers more when damaged)
  const hpRatio=en.hp/en.maxHp;
  const coreCol=hpRatio>0.6?'#ff00ff':hpRatio>0.3?'#ff6600':'#ff0000';
  const coreFlicker=dmg>=2?0.5+Math.sin(t*3)*0.5:1;
  const baseAlpha=en.invT>0&&en.invT%6<3?0.25:en.hurtFlash>0&&en.hurtFlash%4<2?0.5:1;
  ctx.globalAlpha=coreFlicker*baseAlpha;
  ctx.fillStyle=coreCol;ctx.shadowColor=coreCol;ctx.shadowBlur=dmg>=2?25:15;
  ctx.beginPath();ctx.arc(0,-s*0.15,s*(dmg>=2?0.22:0.18),0,6.28);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-s*0.05,-s*0.18,s*0.06,0,6.28);ctx.fill();
  ctx.shadowBlur=0;
  ctx.globalAlpha=baseAlpha;
  // Shoulder pauldrons (one breaks off at dmg>=2)
  ctx.fillStyle=dmg>=1?'#5a2a5a':'#8a4a9a';
  ctx.beginPath();ctx.arc(-s*0.65,-s*0.35,s*0.22,0,6.28);ctx.fill();
  if(dmg<2){
    ctx.beginPath();ctx.arc(s*0.65,-s*0.35,s*0.22,0,6.28);ctx.fill();
  } else {
    // Broken right pauldron - small remnant
    ctx.fillStyle='#3a1530';
    ctx.beginPath();ctx.arc(s*0.65,-s*0.35,s*0.12,0,6.28);ctx.fill();
  }
  // Spikes on pauldrons (break with damage)
  ctx.fillStyle='#c0d0e0';
  if(dmg<1){
    [-1,1].forEach(side=>{
      const sx=side*s*0.65;
      ctx.beginPath();ctx.moveTo(sx,-s*0.55);ctx.lineTo(sx+side*s*0.15,-s*0.8);ctx.lineTo(sx+side*s*0.05,-s*0.5);ctx.closePath();ctx.fill();
    });
  } else {
    // Left spike only (right broken)
    const sx=-s*0.65;
    ctx.beginPath();ctx.moveTo(sx,-s*0.55);ctx.lineTo(sx-s*0.1,-s*0.7);ctx.lineTo(sx-s*0.05,-s*0.5);ctx.closePath();ctx.fill();
  }
  // Head (helmet) - cracks when damaged
  const headGr=ctx.createRadialGradient(0,-s*0.7,s*0.05,0,-s*0.7,s*0.3);
  if(dmg>=2){headGr.addColorStop(0,'#3a1030');headGr.addColorStop(1,'#200518');}
  else{headGr.addColorStop(0,'#5a2a6a');headGr.addColorStop(1,'#3a0a4a');}
  ctx.fillStyle=headGr;
  ctx.beginPath();ctx.arc(0,-s*0.7,s*0.28,0,6.28);ctx.fill();
  // Helmet crest (breaks at dmg>=2)
  if(dmg<2){
    ctx.fillStyle='#9a5aaa';
    ctx.beginPath();ctx.moveTo(0,-s*1.05);ctx.lineTo(-s*0.08,-s*0.75);ctx.lineTo(s*0.08,-s*0.75);ctx.closePath();ctx.fill();
  } else {
    ctx.fillStyle='#5a2a4a';
    ctx.beginPath();ctx.moveTo(0,-s*0.92);ctx.lineTo(-s*0.06,-s*0.78);ctx.lineTo(s*0.04,-s*0.78);ctx.closePath();ctx.fill();
  }
  // Helmet cracks
  if(dmg>=1){
    ctx.strokeStyle='rgba(200,80,150,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-s*0.15,-s*0.85);ctx.lineTo(s*0.05,-s*0.65);ctx.stroke();
  }
  // Eyes (glowing slits) - one eye out at high damage
  ctx.fillStyle='#ff0040';ctx.shadowColor='#ff0040';ctx.shadowBlur=6;
  ctx.fillRect(-s*0.2,-s*0.75,s*0.14,s*0.06);
  if(dmg<2){
    ctx.fillRect(s*0.06,-s*0.75,s*0.14,s*0.06);
  } else {
    // Right eye flickering/out
    ctx.globalAlpha=baseAlpha*0.3;
    ctx.fillRect(s*0.06,-s*0.75,s*0.14,s*0.06);
    ctx.globalAlpha=baseAlpha;
  }
  ctx.shadowBlur=0;
  // Invincible shield effect
  if(en.invT>0){
    ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.globalAlpha=0.3+Math.sin(en.fr*2)*0.2;
    ctx.beginPath();ctx.arc(0,-s*0.2,s*0.9,0,6.28);ctx.stroke();
    ctx.globalAlpha=baseAlpha;
  }
  // Stunned stars
  if(en.state==='invincible'||en.state==='stunned'){
    for(let i=0;i<3;i++){
      const sa=t*2+i*2.09;
      const sx=Math.cos(sa)*s*0.5,sy=-s*1.1+Math.sin(sa*1.5)*s*0.1;
      ctx.fillStyle='#ffd700';ctx.font=`${s*0.3}px monospace`;ctx.textAlign='center';
      ctx.fillText('\u2605',sx,sy);
    }
  }
  // HP bar above head
  const barW=s*1.2,barH=5,barX=-barW/2,barY2=-s*1.2;
  ctx.fillStyle='#333';ctx.fillRect(barX,barY2,barW,barH);
  ctx.fillStyle=coreCol;ctx.fillRect(barX,barY2,barW*hpRatio,barH);
  ctx.strokeStyle='#fff4';ctx.lineWidth=1;ctx.strokeRect(barX,barY2,barW,barH);
  // Damage indicator text
  if(dmg>0){
    ctx.fillStyle='#ff6666';ctx.font=`bold ${s*0.25}px monospace`;ctx.textAlign='center';
    ctx.fillText('\u00D7'+dmg,barW/2+s*0.2,barY2+4);
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function addPop(x,y,txt,col){pops.push({x,y,txt,col,life:45,ml:45});}
function emitParts(x,y,n,col,szMax,spdMax){
  for(let i=0;i<n;i++){const a=(6.28/n)*i;parts.push({x,y,vx:Math.cos(a)*(1+Math.random()*spdMax),vy:Math.sin(a)*(1+Math.random()*spdMax),life:15+Math.random()*15,ml:30,sz:Math.random()*szMax+1,col});}
}

let touchStartY=0,touchStartX=0,touchStartT=0,touchMoved=false;
// Character modal (long-press on title to show details + animated demo)
let charModal={show:false,idx:0,animT:0};
let longPressTimer=null,longPressFired=false,titleTouchPos=null;

function canvasXY(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{x:cx-r.left,y:cy-r.top};
}

// Pause button hit test (top-right corner)
function hitPauseBtn(px,py){return px>=W-52&&px<=W-8&&py>=42&&py<=78;}
function hitResumeBtn(px,py){return px>=W/2-80&&px<=W/2+80&&py>=H*0.45&&py<=H*0.45+44;}
function hitQuitBtn(px,py){return px>=W/2-80&&px<=W/2+80&&py>=H*0.56&&py<=H*0.56+44;}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  const t=e.touches[0];
  const p=canvasXY(t.clientX,t.clientY);
  touchStartY=t.clientY;touchStartX=t.clientX;touchStartT=Date.now();touchMoved=false;
  if(state===ST.TITLE) handleTitleTouch(t.clientX,t.clientY);
  else if(state===ST.STAGE_SEL){selScrollTouchY=t.clientY;selScrolling=false;handleStageSelTouch(t.clientX,t.clientY);}
  else if(state===ST.STAGE_CLEAR&&stageClearT>60) state=ST.STAGE_SEL;
  else if(state===ST.DEAD&&deadT>45){state=isStageMode?ST.STAGE_SEL:ST.TITLE;}
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  const dy=t.clientY-touchStartY;
  const dx=t.clientX-touchStartX;
  if(Math.abs(dy)>20||Math.abs(dx)>20) touchMoved=true;
  if(state===ST.STAGE_SEL){
    const sdy=t.clientY-selScrollTouchY;
    if(Math.abs(sdy)>5){selScrolling=true;stageScrollY-=sdy;selScrollTouchY=t.clientY;stageScrollVel=-sdy;}
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state!==ST.PLAY&&state!==ST.STAGE_PLAY)return;
  const dt=Date.now()-touchStartT;
  const t=e.changedTouches[0];
  const dy=t.clientY-touchStartY;
  if(touchMoved&&Math.abs(dy)>30){
    if(dy>0&&player.gDir===-1){
      player.gDir=1;player.vy=2;totalFlips++;sfx('flip');vibrate(20);
      player.face='flip';setTimeout(()=>{if(player.alive)player.face='normal';},250);
      emitParts(player.x,player.y,10,tc('ply'),3,2.5);player.rotTarget+=Math.PI;
    }else if(dy<0&&player.gDir===1){
      player.gDir=-1;player.vy=-2;totalFlips++;sfx('flip');vibrate(20);
      player.face='flip';setTimeout(()=>{if(player.alive)player.face='normal';},250);
      emitParts(player.x,player.y,10,tc('ply'),3,2.5);player.rotTarget-=Math.PI;
    }
  }else if(!touchMoved||dt<200){
    if(player.grounded){
      const jp=itemEff.spring>0?JUMP_POWER*1.5:JUMP_POWER;
      player.vy=-jp*player.gDir;player.grounded=false;
      sfx('jump');vibrate(10);
      player.face='flip';setTimeout(()=>{if(player.alive)player.face='normal';},180);
      emitParts(player.x,player.y+PLAYER_R*player.gDir,6,tc('ply'),2.5,2);
    } else if(djumpAvailable&&!djumpUsed){
      // Double jump from item (one-time use)
      djumpUsed=true;djumpAvailable=false;
      const jp=JUMP_POWER*ct().jumpMul*0.85;
      player.vy=-jp*player.gDir;
      sfx('jump');vibrate(10);
      player.face='flip';setTimeout(()=>{if(player.alive)player.face='normal';},180);
      emitParts(player.x,player.y,8,'#ffaa00',3,2.5);
    }
  }
},{passive:false});

canvas.addEventListener('mousedown',e=>{
  initAudio();
  if(state===ST.TITLE) handleTitleTouch(e.clientX,e.clientY);
  else if(state===ST.STAGE_SEL) handleStageSelTouch(e.clientX,e.clientY);
  else if(state===ST.STAGE_CLEAR&&stageClearT>60) state=ST.STAGE_SEL;
  else if(state===ST.DEAD&&deadT>45){state=isStageMode?ST.STAGE_SEL:ST.TITLE;}
  else if((state===ST.PLAY||state===ST.STAGE_PLAY)&&player.grounded){
    const jp=itemEff.spring>0?JUMP_POWER*1.5:JUMP_POWER;
    player.vy=-jp*player.gDir;player.grounded=false;
    sfx('jump');vibrate(10);emitParts(player.x,player.y+PLAYER_R*player.gDir,6,tc('ply'),2.5,2);
  }
  else if(state===ST.PLAY&&djumpAvailable&&!djumpUsed){
    djumpUsed=true;djumpAvailable=false;
    const jp=JUMP_POWER*ct().jumpMul*0.85;
    player.vy=-jp*player.gDir;
    sfx('jump');vibrate(10);
    emitParts(player.x,player.y,8,'#ffaa00',3,2.5);
  }
});
document.addEventListener('keydown',e=>{
  if(e.code==='Escape'){
    e.preventDefault();
    if(state===ST.PLAY){state=ST.PAUSE;return;}
    if(state===ST.PAUSE){state=ST.PLAY;return;}
  }
  if(e.code==='Space'||e.code==='ArrowUp'){
    e.preventDefault();initAudio();
    if(state===ST.TITLE){state=ST.PLAY;reset();}
    else if(state===ST.DEAD&&deadT>45){state=isStageMode?ST.STAGE_SEL:ST.TITLE;}
    else if(state===ST.STAGE_CLEAR&&stageClearT>60) state=ST.STAGE_SEL;
    else if((state===ST.PLAY||state===ST.STAGE_PLAY)&&player.grounded){
      const jp=itemEff.spring>0?JUMP_POWER*1.5:JUMP_POWER;
      player.vy=-jp*player.gDir;player.grounded=false;sfx('jump');vibrate(10);
      emitParts(player.x,player.y+PLAYER_R*player.gDir,6,tc('ply'),2.5,2);
    }
    else if(state===ST.PLAY&&djumpAvailable&&!djumpUsed){
      djumpUsed=true;djumpAvailable=false;
      const jp=JUMP_POWER*ct().jumpMul*0.85;
      player.vy=-jp*player.gDir;
      sfx('jump');vibrate(10);
      emitParts(player.x,player.y,8,'#ffaa00',3,2.5);
    }
  }
  if(e.code==='ArrowDown'&&(state===ST.PLAY||state===ST.STAGE_PLAY)){
    e.preventDefault();
    flipCount++;flipTimer=0;
    if(player.gDir===1){player.gDir=-1;player.vy=-2;totalFlips++;player.canFlip=flipCount<ct().maxFlip;sfx('flip');vibrate(20);player.rotTarget-=Math.PI;emitParts(player.x,player.y,10,tc('ply'),3,2.5);}
    else{player.gDir=1;player.vy=2;totalFlips++;player.canFlip=flipCount<ct().maxFlip;sfx('flip');vibrate(20);player.rotTarget+=Math.PI;emitParts(player.x,player.y,10,tc('ply'),3,2.5);}
  }
  if(e.code==='Escape'){
    if(state===ST.STAGE_SEL) state=ST.TITLE;
    else if(state===ST.STAGE_CLEAR) state=ST.STAGE_SEL;
  }
});

function getCharGridIdx(tx,ty){
  const cols=3,rows=2,charW=58,charH=62,charGap=10;
  const gridW=cols*(charW+charGap)-charGap;
  const gridX=W/2-gridW/2,gridY=H*0.44;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;if(idx>=CHARS.length)return -1;
      const cx=gridX+c*(charW+charGap),cy=gridY+r*(charH+charGap);
      if(tx>=cx-5&&tx<=cx+charW+5&&ty>=cy-5&&ty<=cy+charH+5)return idx;
    }
  }
  return -1;
}
function handleTitleTouch(tx,ty){
  // Character selection: 2 rows x 3 columns grid
  const cols=3,rows=2;
  const charW=58,charH=62,charGap=10;
  const gridW=cols*(charW+charGap)-charGap;
  const gridX=W/2-gridW/2;
  const gridY=H*0.38;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;if(idx>=CHARS.length)break;
      const cx=gridX+c*(charW+charGap);
      const cy=gridY+r*(charH+charGap);
      if(tx>=cx-5&&tx<=cx+charW+5&&ty>=cy-5&&ty<=cy+charH+5){
        if(isCharUnlocked(idx)){
          selChar=idx;localStorage.setItem('gd5char',selChar.toString());
        } else {
          buyChar(idx);
        }
        return;
      }
    }
  }
  // Mode buttons
  const btnW=140,btnH=38;
  const btnX=W/2-btnW/2;
  const btnY1=H*0.72,btnY2=H*0.72+btnH+12;
  if(tx>=btnX&&tx<=btnX+btnW&&ty>=btnY1&&ty<=btnY1+btnH){state=ST.PLAY;reset();return;}
  if(tx>=btnX&&tx<=btnX+btnW&&ty>=btnY2&&ty<=btnY2+btnH){state=ST.STAGE_SEL;stageScrollY=0;return;}
}

function handleStageSelTouch(tx,ty){
  if(selScrolling)return;
  // Back button
  if(tx<60&&ty<60+safeTop){state=ST.TITLE;return;}
  // Pack cards
  const cardX=16,cardW=W-32,cardH=130,cardGap=14;
  const startY=55+safeTop-stageScrollY;
  for(let pi=0;pi<STAGE_PACKS.length;pi++){
    const pack=STAGE_PACKS[pi];
    const cy=startY+pi*(cardH+cardGap);
    if(ty<cy||ty>cy+cardH)continue;
    // Check if pack is unlocked
    if(bigCoins<pack.unlock){sfx('locked');vibrate(15);addPop(W/2,ty,'\u30ED\u30C3\u30AF\u4E2D','#ff4444');return;}
    // Stage buttons
    const sbW=44,sbGap=8;
    const totalSbW=5*(sbW+sbGap)-sbGap;
    const sbX=W/2-totalSbW/2;
    const sbY=cy+70;
    for(let si=0;si<5;si++){
      const sx=sbX+si*(sbW+sbGap);
      if(tx>=sx-4&&tx<=sx+sbW+4&&ty>=sbY-4&&ty<=sbY+sbW+4){
        state=ST.STAGE_PLAY;resetStage(pi,si);return;
      }
    }
  }
}

// ===== COLLISION =====
// hurt(): take 1 HP damage (walls, enemies, bullets, crush)
function hurt(){
  if(hurtT>0)return; // still invincible from previous hit
  if(itemEff.invincible>0){shakeI=4;emitParts(player.x,player.y,8,'#ff00ff',3,2);return;}
  // Ghost character: transparent phase evades attacks
  if(ghostInvis){emitParts(player.x,player.y,6,'#a855f7',2,1);return;}
  hp--;
  if(hp<=0){die();return;}
  // Survive with damage
  hurtT=HURT_INVINCIBLE;
  shakeI=10;sfx('hurt');vibrate([20,10,30]);
  player.face='hurt';setTimeout(()=>{if(player.alive)player.face='normal';},400);
  emitParts(player.x,player.y,12,tc('obs'),4,3);
  addPop(player.x,player.y-25,'HP -1','#ff3860');
}
// die(): instant death (void fall = lose all HP, even when invincible)
function die(){
  hp=0;
  player.alive=false;state=ST.DEAD;deadT=0;shakeI=14;switchBGM('dead');
  player.face='dead';sfx('death');vibrate([30,20,50]);
  if(!isStageMode&&score>highScore){highScore=score;newHi=true;localStorage.setItem('gd5hi',highScore.toString());}
  played++;localStorage.setItem('gd5plays',played.toString());
  for(let i=0;i<35;i++){const a=(6.28/35)*i,s=2+Math.random()*6;parts.push({x:player.x,y:player.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35+Math.random()*25,ml:60,sz:Math.random()*6+2,col:i%3===0?CHARS[selChar].col:i%3===1?tc('obs'):'#fff'});}
}

function checkMile(){
  if(isStageMode)return;
  const ms=[25,50,100,150,200,300,500];
  for(const m of ms){
    if(score>=m&&lastMile<m){
      lastMile=m;mileTxt=m+' \u30DD\u30A4\u30F3\u30C8\uFF01';mileT=100;
      sfx('milestone');shakeI=5;vibrate(40);
      // Theme transition at certain milestones for visual progression
      const themeMap={50:1,150:2,300:3,500:4};
      if(themeMap[m]!==undefined&&curTheme!==themeMap[m]){
        prevTheme=curTheme;curTheme=themeMap[m];themeLerp=0;
        mileTxt=THEMES[curTheme].n+'!';
      }
      for(let i=0;i<25;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*3,vy:Math.random()*3+1,life:50+Math.random()*30,ml:80,sz:Math.random()*5+2,col:['#ff3860','#00e5ff','#ffd700','#a855f7','#34d399'][i%5]});
      break;
    }
  }
}

function applyItem(type){
  sfx('item');vibrate(25);
  switch(type){
    case 0:itemEff.shield=ITEMS[0].dur;break;
    case 1:itemEff.slow=ITEMS[1].dur;break;
    case 2:itemEff.magnet=ITEMS[2].dur;break;
    case 3:itemEff.double=ITEMS[3].dur;break;
    case 4:itemEff.mini=ITEMS[4].dur;break;
    case 5:itemEff.spring=ITEMS[5].dur;break;
    case 6:itemEff.ghost=ITEMS[6].dur;break;
    case 7:for(let i=0;i<15;i++)coins.push({x:player.x+50+Math.random()*200,y:player.y-100+Math.random()*200,sz:9,col:false,p:Math.random()*6.28});break;
    case 8:itemEff.timestop=ITEMS[8].dur;break;
    case 9:itemEff.rocket=ITEMS[9].dur;break;
  }
}

// ===== AMBIENT PARTICLES =====
function updateAmbient(){
  if(!isStageMode){ambientParts=[];return;}
  const pt=STAGE_THEMES[currentPackIdx].partType;
  const col=STAGE_THEMES[currentPackIdx].partCol;
  // Spawn
  if(ambientParts.length<40&&frame%4===0){
    switch(pt){
      case'snow':ambientParts.push({x:Math.random()*W,y:-5,vx:(Math.random()-0.5)*0.8-speed*0.2,vy:1+Math.random()*1.5,sz:2+Math.random()*3,a:0.3+Math.random()*0.4,col});break;
      case'ember':ambientParts.push({x:Math.random()*W,y:H+5,vx:(Math.random()-0.5)*0.5,vy:-(1.5+Math.random()*2),sz:1.5+Math.random()*2.5,a:0.5+Math.random()*0.4,col});break;
      case'bubble':ambientParts.push({x:Math.random()*W,y:H+5,vx:(Math.random()-0.5)*0.3,vy:-(0.8+Math.random()*1.2),sz:3+Math.random()*5,a:0.2+Math.random()*0.3,col,wobble:Math.random()*6.28});break;
      case'petal':ambientParts.push({x:W+5,y:Math.random()*H,vx:-(1+Math.random()*1.5+speed*0.3),vy:0.5+Math.random()*1,sz:3+Math.random()*4,a:0.3+Math.random()*0.4,col,rot:Math.random()*6.28,rs:0.03+Math.random()*0.05});break;
    }
  }
  // Update
  ambientParts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(pt==='bubble'){p.wobble+=0.05;p.x+=Math.sin(p.wobble)*0.3;}
    if(pt==='petal'){p.rot+=p.rs;}
    p.a-=0.002;
  });
  ambientParts=ambientParts.filter(p=>p.a>0&&p.x>-20&&p.x<W+20&&p.y>-20&&p.y<H+20);
}

// ===== UPDATE =====
let lastTime=0;
function update(dt){
  frame++;
  if(themeLerp<1)themeLerp=Math.min(1,themeLerp+0.015);
  if(shakeI>0){shakeX=(Math.random()-0.5)*shakeI;shakeY=(Math.random()-0.5)*shakeI;shakeI*=0.88;if(shakeI<0.3){shakeI=0;shakeX=0;shakeY=0;}}
  // combo only resets when a coin is missed (goes off-screen)
  if(comboDspT>0)comboDspT--;
  if(mileT>0)mileT--;
  if(stageNameT>0)stageNameT--;
  pops=pops.filter(p=>{p.y-=1.2;p.life--;return p.life>0;});

  if(state===ST.PAUSE)return; // freeze everything while paused

  if(state===ST.TITLE){
    titleT+=0.03;
    if(unlockCelebT>0)unlockCelebT--;
    if(charModal.show)charModal.animT++;
    stars.forEach(s=>{s.x-=s.sp*0.5;s.tw+=s.ts;if(s.x<-5)s.x=W+5;});
    mtns.forEach(m=>{m.off-=m.sp*0.3;if(m.off<-500)m.off+=500;});
    return;
  }
  if(state===ST.STAGE_SEL){
    titleT+=0.03;
    // Inertial scroll
    stageScrollY+=stageScrollVel*0.3;stageScrollVel*=0.92;
    const maxScroll=Math.max(0,STAGE_PACKS.length*144-H+100);
    stageScrollY=Math.max(0,Math.min(maxScroll,stageScrollY));
    stars.forEach(s=>{s.x-=s.sp*0.5;s.tw+=s.ts;if(s.x<-5)s.x=W+5;});
    mtns.forEach(m=>{m.off-=m.sp*0.3;if(m.off<-500)m.off+=500;});
    return;
  }
  if(state===ST.STAGE_CLEAR){
    stageClearT++;
    if(stageClearT<80&&stageClearT%3===0){
      for(let i=0;i<3;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*3,vy:Math.random()*3+1,life:50+Math.random()*30,ml:80,sz:Math.random()*5+2,col:['#ffd700','#ff3860','#00e5ff','#a855f7','#34d399'][i%5]});
    }
    parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;return p.life>0;});
    return;
  }
  if(state===ST.DEAD){
    deadT++;
    parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.vx*=0.99;p.life--;return p.life>0;});
    stars.forEach(s=>{s.x-=s.sp*0.15;s.tw+=s.ts;if(s.x<-5)s.x=W+5;});
    return;
  }
  if(state===ST.STAGE_CLEAR){
    stageClearT++;
    parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.vx*=0.99;p.life--;return p.life>0;});
    // Spawn celebration particles
    if(stageClearT<60&&stageClearT%3===0){
      for(let i=0;i<3;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*2,vy:1+Math.random()*2,life:50+Math.random()*30,ml:80,sz:Math.random()*5+2,col:['#ffd700','#00e5ff','#ff3860','#34d399'][i%4]});
    }
    return;
  }

  // === PLAYING (PLAY or STAGE_PLAY) ===
  for(const k in itemEff)if(itemEff[k]>0)itemEff[k]--;
  if(wasInvincible&&itemEff.invincible<=0&&state===ST.PLAY)switchBGM('play');
  // Invincibility ending warning: slow down BGM and flash at 90 frames remaining
  if(wasInvincible&&prevInvT===90&&state===ST.PLAY)switchBGM('play');

  const sm=itemEff.slow>0?0.55:1;
  const rm=itemEff.rocket>0?2.2:1;
  const ts=itemEff.timestop>0?0.15:1;
  if(isStageMode){
    speed=(SPEED_INIT*currentStageData.spdMul)*sm*rm*ts;
  }else{
    speed=Math.min(SPEED_MAX,(SPEED_INIT+dist*SPEED_INC))*sm*rm*ts;
  }

  const scoreMul=itemEff.double>0?2:1;
  dist+=speed*0.08*scoreMul;
  const ns=Math.floor(dist);
  if(ns>score){score=ns;checkMile();}

  // Stage clear check
  if(isStageMode&&dist>=currentStageData.dist){
    state=ST.STAGE_CLEAR;stageClearT=0;
    gotNewBigCoin=false;
    if(!stageProgress[currentStageData.id]){
      stageProgress[currentStageData.id]=true;
      bigCoins=Object.keys(stageProgress).length;
      localStorage.setItem('gd5sp',JSON.stringify(stageProgress));
      gotNewBigCoin=true;
    }
    sfx('stageclear');vibrate(40);shakeI=8;
    for(let i=0;i<40;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*4,vy:Math.random()*4+1,life:60+Math.random()*30,ml:90,sz:Math.random()*6+2,col:['#ffd700','#ff3860','#00e5ff','#a855f7','#34d399'][i%5]});
    return;
  }

  terrainOffset+=speed;
  terrainFloor.forEach(s=>s.x-=speed);
  terrainCeil.forEach(s=>s.x-=speed);
  while(terrainFloor.length>0&&terrainFloor[0].x<-SEG_W*2)terrainFloor.shift();
  while(terrainCeil.length>0&&terrainCeil[0].x<-SEG_W*2)terrainCeil.shift();
  const lastF=terrainFloor[terrainFloor.length-1];
  const lastC=terrainCeil[terrainCeil.length-1];
  if(lastF&&lastF.x<W+200)generateTerrain(terrainFloor,true,lastF.x+SEG_W,15,stageRng);
  if(lastC&&lastC.x<W+200)generateTerrain(terrainCeil,false,lastC.x+SEG_W,15,stageRng);

  trySpawnCoins();trySpawnItem();
  updateAmbient();

  const pr=itemEff.mini>0?PLAYER_R*0.6:PLAYER_R;
  const grav=GRAVITY*player.gDir;
  player.vy+=grav;player.vy=Math.max(-14,Math.min(14,player.vy));
  if(itemEff.rocket>0){player.vy*=0.7;if(frame%2===0)emitParts(player.x-10,player.y,2,'#f97316',3,1);}
  player.y+=player.vy;

  player.grounded=false;
  if(player.gDir===1){const surfY=floorSurfaceY(player.x);if(player.y+pr>=surfY){player.y=surfY-pr;player.vy=0;player.grounded=true;}}
  else{const surfY=ceilSurfaceY(player.x);if(player.y-pr<=surfY){player.y=surfY+pr;player.vy=0;player.grounded=true;}}

  const fSurf=floorSurfaceY(player.x),cSurf=ceilSurfaceY(player.x);
  if(fSurf-cSurf<pr*2+4){die();return;}
  if(player.y+pr>H+30||player.y-pr<-30){die();return;}
  player.rot+=(player.rotTarget-player.rot)*0.12;
  player.trail.push({x:player.x,y:player.y,a:1});
  if(player.trail.length>14)player.trail.shift();
  player.trail.forEach(t=>t.a-=0.075);

  coins.forEach(c=>{
    c.x-=speed;c.p+=0.08;
    if(!c.col){
      let cd=pr+c.sz;
      if(itemEff.magnet>0){const dx=player.x-c.x,dy=player.y-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d<180){c.x+=dx*0.12;c.y+=dy*0.12;}cd*=1.8;}
      const dx=player.x-c.x,dy=player.y-c.y;
      if(Math.sqrt(dx*dx+dy*dy)<cd){
        c.col=true;totalCoins++;combo++;comboDsp=combo;comboDspT=55;
        if(combo>maxCombo)maxCombo=combo;
        const bon=Math.ceil((3+Math.min(combo-1,8))*ct().coinMul);
        dist+=bon;sfx(combo>1?'combo':'coin');
        addPop(c.x,c.y-14,'+'+bon,'#ffd700');vibrate(10);
        if(combo>1)addPop(c.x,c.y-34,combo+'x','#ff6b35');
        emitParts(c.x,c.y,6,'#ffd700',3,2);
        player.face='happy';setTimeout(()=>{if(player.alive)player.face='normal';},250);
      }
    }
  });
  // Reset combo if any uncollected coin goes off-screen
  const prevCoinCount=coins.length;
  coins=coins.filter(c=>{
    if(c.col)return false; // collected, remove
    if(c.x>-50)return true; // still on screen, keep
    // Missed coin went off-screen: break combo
    if(combo>0){combo=0;comboT=0;}
    return false;
  });

  items.forEach(it=>{
    it.x-=speed;it.p+=0.06;
    if(!it.col){const dx=player.x-it.x,dy=player.y-it.y;
      if(Math.sqrt(dx*dx+dy*dy)<pr+it.sz){
        it.col=true;applyItem(it.t);
        addPop(it.x,it.y-18,ITEMS[it.t].name+'!',ITEMS[it.t].col);
        emitParts(it.x,it.y,12,ITEMS[it.t].col,4,3);
        player.face='happy';setTimeout(()=>{if(player.alive)player.face='normal';},300);
      }}
  });
  items=items.filter(it=>it.x>-50&&!it.col);

  if(itemEff.ghost<=0&&itemEff.shield<=0){
    const ahead=player.gDir===1?floorSurfaceY(player.x+pr):ceilSurfaceY(player.x+pr);
    if(player.gDir===1&&player.y+pr>ahead+pr*0.7&&player.grounded){
      const aheadMore=floorSurfaceY(player.x+pr+10);
      if(ahead-aheadMore>12){die();return;}
    }
  }

  if(itemEff.shield>0&&frame%3===0){const a=Math.random()*6.28;parts.push({x:player.x+Math.cos(a)*18,y:player.y+Math.sin(a)*18,vx:Math.cos(a)*0.4,vy:Math.sin(a)*0.4,life:12,ml:12,sz:Math.random()*3+1,col:'#3b82f6'});}
  if(itemEff.ghost>0&&frame%4===0)parts.push({x:player.x-8+Math.random()*16,y:player.y+pr,vx:0,vy:0.5,life:15,ml:15,sz:2,col:'#8b5cf688'});
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
  stars.forEach(s=>{s.x-=s.sp*speed*0.3;s.tw+=s.ts;if(s.x<-5)s.x=W+5;});
  mtns.forEach(m=>{m.off-=m.sp*speed*0.15;if(m.off<-500)m.off+=500;});
}

// ===== DRAW =====
function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawTerrainSurface(arr,isFloor){
  if(arr.length<2)return;
  ctx.beginPath();
  if(isFloor){ctx.moveTo(arr[0].x,H-arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,H-arr[i].h);ctx.lineTo(arr[arr.length-1].x,H+10);ctx.lineTo(arr[0].x,H+10);}
  else{ctx.moveTo(arr[0].x,arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,arr[i].h);ctx.lineTo(arr[arr.length-1].x,-10);ctx.lineTo(arr[0].x,-10);}
  ctx.closePath();
  const gr=ctx.createLinearGradient(0,isFloor?H-80:0,0,isFloor?H:80);
  gr.addColorStop(0,tc('gnd'));gr.addColorStop(1,tc('gnd2'));ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();
  if(isFloor){ctx.moveTo(arr[0].x,H-arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,H-arr[i].h);}
  else{ctx.moveTo(arr[0].x,arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,arr[i].h);}
  ctx.strokeStyle=tc('line');ctx.lineWidth=2;ctx.shadowColor=tc('line');ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;
}

function drawAmbient(){
  ambientParts.forEach(p=>{
    ctx.globalAlpha=p.a;ctx.fillStyle=p.col;
    if(p.rot!==undefined){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.beginPath();ctx.ellipse(0,0,p.sz,p.sz*0.5,0,0,6.28);ctx.fill();ctx.restore();
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,6.28);ctx.fill();
    }
  });
  ctx.globalAlpha=1;
}

function draw(){
  ctx.save();ctx.translate(shakeX,shakeY);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,tc('bg1'));bg.addColorStop(1,tc('bg2'));
  ctx.fillStyle=bg;ctx.fillRect(-20,-20,W+40,H+40);

  stars.forEach(s=>{ctx.globalAlpha=s.a*(0.6+Math.sin(s.tw)*0.4);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,6.28);ctx.fill();});
  ctx.globalAlpha=1;
  mtns.forEach(m=>{ctx.globalAlpha=m.a;ctx.fillStyle=tc('line');ctx.beginPath();ctx.moveTo(-10,H*0.75);m.pts.forEach(p=>ctx.lineTo(p.x+m.off,H*0.75-p.h));ctx.lineTo(W+510+m.off,H*0.75);ctx.closePath();ctx.fill();});
  ctx.globalAlpha=1;

  drawTerrainSurface(terrainFloor,true);
  drawTerrainSurface(terrainCeil,false);

  if(state===ST.TITLE){drawTitle();ctx.restore();return;}
  if(state===ST.STAGE_SEL){drawStageSel();ctx.restore();return;}

  // Ambient particles for stage themes
  if(isStageMode)drawAmbient();

  coins.forEach(drawCoin);items.forEach(drawItem);

  player.trail.forEach(t=>{if(t.a<=0)return;ctx.globalAlpha=t.a*0.15;ctx.fillStyle=CHARS[selChar].col;const s=PLAYER_R*(0.3+t.a*0.5);ctx.beginPath();ctx.arc(t.x,t.y,s,0,6.28);ctx.fill();});
  ctx.globalAlpha=1;

  if(player.alive)drawPlayer();

  parts.forEach(p=>{ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,6.28);ctx.fill();});
  ctx.globalAlpha=1;

  drawUI();
  if(isStageMode)drawStageProgress();
  pops.forEach(p=>{const a=p.life/p.ml;ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y);});
  ctx.globalAlpha=1;
  if(mileT>0)drawMile();
  // Invincibility rainbow overlay
  if(itemEff.invincible>0&&state===ST.PLAY){
    const invLeft=itemEff.invincible;
    const ending=invLeft<=90; // last 1.5 seconds = warning phase
    const hue=(frame*6)%360;
    if(ending){
      // Big flashing warning - rapid blink that gets faster
      const blinkSpeed=invLeft<30?0.8:invLeft<60?0.5:0.3;
      const blinkAlpha=Math.abs(Math.sin(frame*blinkSpeed));
      ctx.fillStyle=`rgba(255,255,255,${blinkAlpha*0.25})`;ctx.fillRect(-20,-20,W+40,H+40);
      // Shrinking rainbow border
      const borderW=4+invLeft/90*8;
      const borderAlpha=0.3+blinkAlpha*0.3;
      ctx.strokeStyle=`hsla(${hue},100%,60%,${borderAlpha})`;ctx.lineWidth=borderW;
      ctx.strokeRect(-5,-5,W+10,H+10);
      // Warning text flash
      if(invLeft<60&&Math.floor(frame/8)%2===0){
        ctx.save();ctx.globalAlpha=0.6;
        ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.textAlign='center';
        ctx.shadowColor='#ff0000';ctx.shadowBlur=15;
        ctx.fillText('\u7121\u6575\u7d42\u4e86\u9593\u8fd1!',W/2,H*0.15);
        ctx.shadowBlur=0;ctx.restore();
      }
    } else {
      const ra=0.06+Math.sin(frame*0.15)*0.03;
      ctx.fillStyle=`hsla(${hue},100%,60%,${ra})`;ctx.fillRect(-20,-20,W+40,H+40);
      // Rainbow edge glow
      const ew=8+Math.sin(frame*0.2)*4;
      for(let i=0;i<4;i++){
        const eh=(frame*4+i*90)%360;
        ctx.fillStyle=`hsla(${eh},100%,50%,0.15)`;
        if(i===0)ctx.fillRect(-5,-5,W+10,ew);
        else if(i===1)ctx.fillRect(-5,H-ew,-5,ew+10);
        else if(i===2)ctx.fillRect(-5,-5,ew,H+10);
        else ctx.fillRect(W-ew,-5,ew+5,H+10);
      }
    }
    // Sparkle particles in corners (fewer during ending)
    if(frame%(ending?6:3)===0){
      const sx=Math.random()*W,sy=Math.random()<0.5?Math.random()*40:H-Math.random()*40;
      parts.push({x:sx,y:sy,vx:(Math.random()-0.5)*1,vy:(Math.random()-0.5)*1,life:12,ml:12,sz:Math.random()*3+1,col:`hsl(${(frame*8+Math.random()*60)%360},100%,70%)`});
    }
  }
  // Boss alert overlay
  if(bossPhase.active&&bossPhase.prepare>0){
    const t=bossPhase.alertT;
    // Flashing red vignette
    const flash=Math.sin(t*0.3)*0.15+0.15;
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(180,0,0,${flash})`);
    ctx.fillStyle=vg;ctx.fillRect(-20,-20,W+40,H+40);
    // Warning text
    if(t>15){
      const ta=Math.min(1,(t-15)/10)*Math.abs(Math.sin(t*0.12));
      ctx.save();ctx.globalAlpha=ta;
      ctx.fillStyle='#ff3860';ctx.font='bold 42px monospace';ctx.textAlign='center';
      ctx.shadowColor='#ff0000';ctx.shadowBlur=30;
      ctx.fillText('\u26A0 WARNING',W/2,H*0.35);
      ctx.font='bold 18px monospace';ctx.fillStyle='#ff6080';
      ctx.fillText('BOSS \u51FA\u73FE',W/2,H*0.43);
      ctx.shadowBlur=0;ctx.restore();
    }
    // Red scan lines
    if(t%6<3){
      ctx.fillStyle='rgba(255,0,0,0.04)';
      for(let y=0;y<H;y+=4)ctx.fillRect(0,y,W,2);
    }
  }
  // Boss phase UI (enemy count)
  if(bossPhase.active&&bossPhase.prepare<=0&&!bossPhase.reward){
    ctx.fillStyle='#ff3860';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText('\u6575: '+(bossPhase.total-bossPhase.defeated)+' / '+bossPhase.total,W/2,96);
  }
  if(state===ST.DEAD)drawDead();
  if(state===ST.STAGE_CLEAR)drawStageClear();
  ctx.restore();
}

function drawCoin(c){
  const p=Math.sin(c.p)*0.2+1,sz=c.sz*p;
  ctx.shadowColor='#ffd70055';ctx.shadowBlur=10;ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(c.x,c.y,sz,0,6.28);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(c.x-sz*0.2,c.y-sz*0.2,sz*0.3,0,6.28);ctx.fill();
}
function drawItem(it){
  const pl=Math.sin(it.p)*0.15+1,sz=it.sz*pl,col=ITEMS[it.t].col;
  ctx.shadowColor=col+'77';ctx.shadowBlur=16;ctx.fillStyle=col;
  ctx.save();ctx.translate(it.x,it.y);ctx.rotate(Math.PI/4+it.p*0.3);
  rr(-sz/2,-sz/2,sz,sz,3);ctx.fill();ctx.shadowBlur=0;
  ctx.rotate(-(Math.PI/4+it.p*0.3));
  ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ITEMS[it.t].icon,0,1);ctx.textBaseline='alphabetic';ctx.restore();
}

function drawEnemy(en){
  if(en.bossType==='charge'){drawBossCharge(en);return;}
  if(en.bossType==='bruiser'){drawBossBruiser(en);return;}
  if(en.bossType==='wizard'){drawBossWizard(en);return;}
  if(en.type===1){drawShooter(en);return;}
  if(en.type===2){drawFlyer(en);return;}
  if(en.type===3){drawBomber(en);return;}
  if(en.type===4){drawVertMover(en);return;}
  if(en.type===5){drawPhantom(en);return;}
  const s=en.sz,flip=en.gDir;
  ctx.save();ctx.translate(en.x,en.y);
  if(flip===-1)ctx.scale(1,-1);
  // Body (mushroom/goomba shape)
  const gr=ctx.createRadialGradient(0,0,0,0,0,s);
  gr.addColorStop(0,'#a0522d');gr.addColorStop(1,'#6b3410');
  ctx.fillStyle=gr;
  ctx.beginPath();ctx.arc(0,-s*0.15,s*0.85,0,Math.PI*2);ctx.fill();

  const fw=s*0.3,fh=s*0.2,step=Math.sin(en.fr*2)*s*0.18;

  ctx.fillRect(-s*0.5+step,s*0.4,fw,fh);

  if(en.patrolDir!==undefined){
    ctx.fillStyle='#4a2508';
    const arrowX=en.patrolDir>0?s*0.6:-s*0.6;
    ctx.beginPath();ctx.moveTo(arrowX,0);ctx.lineTo(arrowX-en.patrolDir*4,-3);ctx.lineTo(arrowX-en.patrolDir*4,3);ctx.closePath();ctx.fill();
  }
  // Angry eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-s*0.25,-s*0.25,s*0.22,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(s*0.25,-s*0.25,s*0.22,0,6.28);ctx.fill();
  ctx.fillStyle='#1a0a00';
  ctx.beginPath();ctx.arc(-s*0.2,-s*0.28,s*0.12,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(s*0.3,-s*0.28,s*0.12,0,6.28);ctx.fill();
  // Angry eyebrows
  ctx.strokeStyle='#4a2508';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-s*0.45,-s*0.3);ctx.lineTo(-s*0.1,-s*0.48);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*0.45,-s*0.3);ctx.lineTo(s*0.1,-s*0.48);ctx.stroke();
  ctx.restore();
}

function drawShooter(en){

function drawBomber(en){
  const s=en.sz,t=en.fr;

  const throwAnim=t<15?Math.sin(t/15*Math.PI):-0.2;
  ctx.strokeStyle='#22c55e';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.1);
  ctx.quadraticCurveTo(-s*0.8,-s*0.5-throwAnim*s*0.8,-s*0.6,-s*0.8-throwAnim*s*0.5);
  ctx.stroke();
  // Bomb in hand (only when about to throw)

    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-s*0.6,-s*0.9,s*0.2,0,6.28);ctx.fill();

}
function drawVertMover(en){

  const squash=en.pauseT>0?1.2:0.9+Math.abs(Math.sin(en.fr*0.15))*0.2;
  ctx.scale(1/squash,squash);
  const gr=ctx.createRadialGradient(0,0,0,0,0,s);
  gr.addColorStop(0,'#4488ff');gr.addColorStop(1,'#2244aa');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,s*0.9,0,6.28);ctx.fill();
  // Arrow indicator showing movement direction
  ctx.fillStyle='#fff5';
  const arrowY=en.moveDir<0?-s*0.5:s*0.5;
  ctx.beginPath();ctx.moveTo(-s*0.3,arrowY);ctx.lineTo(0,arrowY+en.moveDir*(-s*0.4));ctx.lineTo(s*0.3,arrowY);ctx.closePath();ctx.fill();
  // Eyes

  ctx.beginPath();ctx.arc(s*0.25,-s*0.15+eyeOff,s*0.1,0,6.28);ctx.fill();

function drawPhantom(en){
  const s=en.sz;
  // Calculate alpha based on visibility state - nearly invisible when hidden
  let alpha=1;
  if(!en.visible){
    alpha=en.fadeT>0?en.fadeT/20*0.95:0.03; // barely visible when transparent
  } else if(en.fadeT>0){
    alpha=0.03+(1-en.fadeT/20)*0.97; // fade in from nearly invisible
  }
  ctx.save();ctx.translate(en.x,en.y);
  ctx.globalAlpha=alpha;
  // Ghost-like wispy body
  const wobble=Math.sin(en.fr*0.1)*s*0.1;
  ctx.fillStyle='#88ddff';ctx.shadowColor='#88ddff';ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.moveTo(-s*0.7,-s*0.3);
  ctx.quadraticCurveTo(-s*0.8,-s*0.8,0,-s*0.9);
  ctx.quadraticCurveTo(s*0.8,-s*0.8,s*0.7,-s*0.3);
  ctx.quadraticCurveTo(s*0.8,s*0.3,s*0.5+wobble,s*0.8);
  ctx.quadraticCurveTo(s*0.2,s*0.5,0,s*0.7+wobble*0.5);
  ctx.quadraticCurveTo(-s*0.2,s*0.5,-s*0.5-wobble,s*0.8);
  ctx.quadraticCurveTo(-s*0.8,s*0.3,-s*0.7,-s*0.3);
  ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  // Inner glow
  ctx.fillStyle='rgba(200,240,255,0.3)';
  ctx.beginPath();ctx.arc(0,-s*0.2,s*0.4,0,6.28);ctx.fill();
  // Eyes (glowing)
  ctx.fillStyle=en.visible?'#fff':'#fff4';
  ctx.beginPath();ctx.arc(-s*0.2,-s*0.3,s*0.18,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(s*0.2,-s*0.3,s*0.18,0,6.28);ctx.fill();
  ctx.fillStyle=en.visible?'#4400aa':'#4400aa44';
  ctx.beginPath();ctx.arc(-s*0.15,-s*0.32,s*0.1,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(s*0.25,-s*0.32,s*0.1,0,6.28);ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
}
function drawBullet(b){
  ctx.save();ctx.translate(b.x,b.y);
  if(b.bomb){

    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(0,0,b.sz,0,6.28);ctx.fill();
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(-b.sz*0.2,-b.sz*0.2,b.sz*0.4,0,6.28);ctx.fill();

    // Spark

    ctx.beginPath();ctx.arc(b.sz*0.3,-b.sz*1.8,2+Math.random()*2,0,6.28);ctx.fill();

  } else if(b.wizBullet){

    ctx.fillStyle='#eeccff';ctx.beginPath();ctx.arc(0,0,b.sz*0.4,0,6.28);ctx.fill();
    ctx.shadowBlur=0;

    ctx.shadowColor='#ef4444';ctx.shadowBlur=10;
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(0,0,b.sz,0,6.28);ctx.fill();
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(0,0,b.sz*0.5,0,6.28);ctx.fill();

  }
  ctx.restore();
}

function drawCharacter(x,y,charIdx,r,rot,alpha,face,dmgLevel){
  dmgLevel=dmgLevel||0; // 0=full HP, 1=hurt once, 2=critical
  const ch=CHARS[charIdx];
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;
  const gr=ctx.createRadialGradient(0,0,0,0,0,r);
  gr.addColorStop(0,ch.col);gr.addColorStop(1,ch.col2);
  switch(ch.shape){
    case'cube':ctx.fillStyle=gr;rr(-r,-r,r*2,r*2,r*0.3);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.12)';rr(-r*0.75,-r*0.75,r*1.5,r*1.5,r*0.2);ctx.fill();break;
    case'ball':ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,r,0,6.28);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(-r*0.2,-r*0.2,r*0.6,0,6.28);ctx.fill();break;
    case'star':ctx.fillStyle=gr;ctx.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*6.28/5;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);const a2=a+6.28/10;ctx.lineTo(Math.cos(a2)*r*0.45,Math.sin(a2)*r*0.45);}ctx.closePath();ctx.fill();break;
    case'ghost':ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,-r*0.15,r,Math.PI,0);ctx.lineTo(r,r);for(let i=0;i<4;i++){const bx=r-i*(r*2/4)-r*2/8;ctx.quadraticCurveTo(bx+r/8,r-r*0.35,bx-r/8,r);}ctx.closePath();ctx.fill();break;
    case'ninja':ctx.fillStyle=gr;rr(-r,-r,r*2,r*2,r*0.25);ctx.fill();ctx.fillStyle='#1a1a1a';ctx.fillRect(-r*1.1,-r*0.1,r*2.2,r*0.35);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(r*0.8,-r*0.1);ctx.quadraticCurveTo(r*1.4,-r*0.5,r*1.6,-r*0.8);ctx.stroke();break;
    case'flame':ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,r*0.15,r*0.85,0,6.28);ctx.fill();ctx.fillStyle=ch.col;for(let i=0;i<3;i++){const fx=-r*0.4+i*r*0.4,fy=-r*0.7-Math.sin(frame*0.15+i)*r*0.3;ctx.beginPath();ctx.moveTo(fx-r*0.2,0);ctx.quadraticCurveTo(fx,fy,fx+r*0.2,0);ctx.fill();}break;
  }
  const eY=face==='dead'?0:-r*0.15;
  if(face==='dead'){ctx.strokeStyle=ch.eye;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(r*0.05,eY-r*0.15);ctx.lineTo(r*0.35,eY+r*0.15);ctx.stroke();ctx.beginPath();ctx.moveTo(r*0.35,eY-r*0.15);ctx.lineTo(r*0.05,eY+r*0.15);ctx.stroke();}
  else{ctx.fillStyle=ch.eye;ctx.beginPath();ctx.arc(r*0.2,eY,r*0.28,0,6.28);ctx.fill();ctx.fillStyle=ch.pupil;ctx.beginPath();ctx.arc(r*0.28,eY,r*0.14,0,6.28);ctx.fill();ctx.fillStyle=ch.eye;ctx.beginPath();ctx.arc(r*0.33,eY-r*0.1,r*0.06,0,6.28);ctx.fill();if(face==='happy'){ctx.strokeStyle=ch.eye;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(r*0.15,eY+r*0.3,r*0.15,0.2,Math.PI-0.2);ctx.stroke();}}
  ctx.restore();
}
