let audioCtx=null,bgmPlaying=false,bgmGain=null;
function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();startBGM();}catch(e){}}
function startBGM(){
  if(!audioCtx||bgmPlaying)return;bgmPlaying=true;
  bgmGain=audioCtx.createGain();bgmGain.gain.value=0.04;bgmGain.connect(audioCtx.destination);
  const notes=[261,329,392,523,392,329,261,196];let bi=0;
  (function play(){if(!bgmPlaying)return;try{
    const now=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(bgmGain);o.type='triangle';
    o.frequency.setValueAtTime(notes[bi%notes.length],now);
    g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
    o.start(now);o.stop(now+0.35);
    if(bi%2===0){const b=audioCtx.createOscillator(),g2=audioCtx.createGain();b.connect(g2);g2.connect(bgmGain);b.type='sine';b.frequency.setValueAtTime(notes[bi%notes.length]/2,now);g2.gain.setValueAtTime(0.2,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.4);b.start(now);b.stop(now+0.4);}
    bi++;
  }catch(e){}setTimeout(play,400);})();
}
function sfx(type){
  if(!audioCtx)return;try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime;
    switch(type){
      case'jump':o.type='sine';o.frequency.setValueAtTime(380,t);o.frequency.exponentialRampToValueAtTime(580,t+0.08);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.start(t);o.stop(t+0.1);break;
      case'flip':o.type='sine';o.frequency.setValueAtTime(250,t);o.frequency.exponentialRampToValueAtTime(600,t+0.15);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.start(t);o.stop(t+0.18);break;
      case'coin':o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(1320,t+0.05);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.start(t);o.stop(t+0.12);break;
      case'item':o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(1200,t+0.18);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.start(t);o.stop(t+0.25);break;
      case'death':o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(40,t+0.45);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);break;
      case'milestone':o.type='sine';o.frequency.setValueAtTime(523,t);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.4);[659,784,1047].forEach((f,i)=>{const x=audioCtx.createOscillator(),y=audioCtx.createGain();x.connect(y);y.connect(audioCtx.destination);x.type='sine';x.frequency.setValueAtTime(f,t+0.1*(i+1));y.gain.setValueAtTime(0.08,t+0.1*(i+1));y.gain.exponentialRampToValueAtTime(0.001,t+0.1*(i+1)+0.25);x.start(t+0.1*(i+1));x.stop(t+0.1*(i+1)+0.25);});break;

      case'stageclear':[523,659,784,1047,1319].forEach((f,i)=>{const x=audioCtx.createOscillator(),y=audioCtx.createGain();x.connect(y);y.connect(audioCtx.destination);x.type='sine';x.frequency.setValueAtTime(f,t+0.08*i);y.gain.setValueAtTime(0.1,t+0.08*i);y.gain.exponentialRampToValueAtTime(0.001,t+0.08*i+0.3);x.start(t+0.08*i);x.stop(t+0.08*i+0.3);});o.frequency.setValueAtTime(1,t);g.gain.setValueAtTime(0,t);o.start(t);o.stop(t+0.01);break;

    }
  }catch(e){}
}

function generateTerrain(arr,isFloor,startX,count,rng){
  const rand=rng||Math.random;
  const last=arr.length>0?arr[arr.length-1]:null;
  let h=last?last.h:GROUND_H;
  const hc=isStageMode&&currentStageData?currentStageData.hillChance:0.08;
  for(let i=0;i<count;i++){
    const x=startX+i*SEG_W;
    const r=rand();
    if(r<hc*0.25&&(isStageMode?dist>20:score>30)) h=Math.min(H*0.35,h+35+rand()*25);
    else if(r<hc*0.5) h=Math.max(35,h-20-rand()*15);
    else if(r<hc&&(isStageMode?dist>5:score>15)) h+=8+rand()*12;
    else if(r<hc*2) h-=5+rand()*8;
    else h+=(rand()-0.5)*4;
    h=Math.max(45+safeBot,Math.min(H*0.38,h));
    arr.push({x,h});
  }
}

function floorSurfaceY(px){for(let i=0;i<terrainFloor.length-1;i++){const s=terrainFloor[i],n=terrainFloor[i+1];if(px>=s.x&&px<n.x){const t=(px-s.x)/(n.x-s.x);return H-s.h-(n.h-s.h)*t;}}return H-GROUND_H;}
function ceilSurfaceY(px){for(let i=0;i<terrainCeil.length-1;i++){const s=terrainCeil[i],n=terrainCeil[i+1];if(px>=s.x&&px<n.x){const t=(px-s.x)/(n.x-s.x);return s.h+(n.h-s.h)*t;}}return GROUND_H;}

function reset(){
  isStageMode=false;currentStageData=null;stageRng=null;
  player.x=W*0.2;player.gDir=1;player.vy=0;player.rot=0;player.rotTarget=0;player.trail=[];player.alive=true;player.grounded=false;player.face='normal';

// ===== SPAWNING =====
let lastCoinX=0,lastItemX=0;
function trySpawnCoins(){
  const edge=terrainFloor[terrainFloor.length-1];if(!edge||edge.x-lastCoinX<80)return;
  const rand=stageRng||Math.random;
  if(rand()<0.35){const cx=edge.x,fy=floorSurfaceY(cx);
    if(player.gDir===1||rand()<0.5){for(let i=0;i<2+Math.floor(rand()*3);i++)coins.push({x:cx+i*28,y:fy-40-rand()*30,sz:9,col:false,p:rand()*6.28});}
    else{const csy=ceilSurfaceY(cx);for(let i=0;i<2+Math.floor(rand()*3);i++)coins.push({x:cx+i*28,y:csy+40+rand()*30,sz:9,col:false,p:rand()*6.28});}
    lastCoinX=edge.x;}
}
function trySpawnItem(){
  const edge=terrainFloor[terrainFloor.length-1];if(!edge||edge.x-lastItemX<350)return;
  const rand=stageRng||Math.random;
  if(score>=3&&rand()<0.12){const ix=edge.x,fy=floorSurfaceY(ix),it=Math.floor(rand()*ITEMS.length);
    items.push({x:ix,y:fy-55-rand()*25,t:it,sz:14,p:rand()*6.28,col:false});lastItemX=edge.x;}
}
function addPop(x,y,txt,col){pops.push({x,y,txt,col,life:45,ml:45});}
function emitParts(x,y,n,col,szMax,spdMax){for(let i=0;i<n;i++){const a=(6.28/n)*i;parts.push({x,y,vx:Math.cos(a)*(1+Math.random()*spdMax),vy:Math.sin(a)*(1+Math.random()*spdMax),life:15+Math.random()*15,ml:30,sz:Math.random()*szMax+1,col});}}

// ===== INPUT =====
let touchStartY=0,touchStartX=0,touchStartT=0,touchMoved=false;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  const t=e.touches[0];touchStartY=t.clientY;touchStartX=t.clientX;touchStartT=Date.now();touchMoved=false;
  if(state===ST.TITLE) handleTitleTouch(t.clientX,t.clientY);
  else if(state===ST.STAGE_SEL){selScrollTouchY=t.clientY;selScrolling=false;handleStageSelTouch(t.clientX,t.clientY);}
  else if(state===ST.STAGE_CLEAR&&stageClearT>60) state=ST.STAGE_SEL;
  else if(state===ST.DEAD&&deadT>45){state=isStageMode?ST.STAGE_SEL:ST.TITLE;}
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();const t=e.touches[0];
  const dy=t.clientY-touchStartY,dx=t.clientX-touchStartX;
  if(Math.abs(dy)>20||Math.abs(dx)>20) touchMoved=true;
  if(state===ST.STAGE_SEL){const sdy=t.clientY-selScrollTouchY;if(Math.abs(sdy)>5){selScrolling=true;stageScrollY-=sdy;selScrollTouchY=t.clientY;stageScrollVel=-sdy;}}
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state!==ST.PLAY&&state!==ST.STAGE_PLAY)return;
  const dt=Date.now()-touchStartT,t=e.changedTouches[0],dy=t.clientY-touchStartY;
  if(touchMoved&&Math.abs(dy)>30){
    if(dy>0&&player.gDir===-1){player.gDir=1;player.vy=2;totalFlips++;sfx('flip');vibrate(20);player.face='flip';setTimeout(()=>{if(player.alive)player.face='normal';},250);emitParts(player.x,player.y,10,tc('ply'),3,2.5);player.rotTarget+=Math.PI;}
    else if(dy<0&&player.gDir===1){player.gDir=-1;player.vy=-2;totalFlips++;sfx('flip');vibrate(20);player.face='flip';setTimeout(()=>{if(player.alive)player.face='normal';},250);emitParts(player.x,player.y,10,tc('ply'),3,2.5);player.rotTarget-=Math.PI;}
  }else if(!touchMoved||dt<200){
    if(player.grounded){const jp=itemEff.spring>0?JUMP_POWER*1.5:JUMP_POWER;player.vy=-jp*player.gDir;player.grounded=false;sfx('jump');vibrate(10);player.face='flip';setTimeout(()=>{if(player.alive)player.face='normal';},180);emitParts(player.x,player.y+PLAYER_R*player.gDir,6,tc('ply'),2.5,2);}
  }
},{passive:false});

canvas.addEventListener('mousedown',e=>{
  initAudio();
  if(state===ST.TITLE) handleTitleTouch(e.clientX,e.clientY);
  else if(state===ST.STAGE_SEL) handleStageSelTouch(e.clientX,e.clientY);
  else if(state===ST.STAGE_CLEAR&&stageClearT>60) state=ST.STAGE_SEL;
  else if(state===ST.DEAD&&deadT>45){state=isStageMode?ST.STAGE_SEL:ST.TITLE;}

});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();initAudio();
    if(state===ST.TITLE){state=ST.PLAY;reset();}
    else if(state===ST.DEAD&&deadT>45){state=isStageMode?ST.STAGE_SEL:ST.TITLE;}
    else if(state===ST.STAGE_CLEAR&&stageClearT>60) state=ST.STAGE_SEL;
    else if((state===ST.PLAY||state===ST.STAGE_PLAY)&&player.grounded){const jp=itemEff.spring>0?JUMP_POWER*1.5:JUMP_POWER;player.vy=-jp*player.gDir;player.grounded=false;sfx('jump');vibrate(10);emitParts(player.x,player.y+PLAYER_R*player.gDir,6,tc('ply'),2.5,2);}
  }
  if(e.code==='ArrowDown'&&(state===ST.PLAY||state===ST.STAGE_PLAY)){e.preventDefault();
    if(player.gDir===1){player.gDir=-1;player.vy=-2;totalFlips++;sfx('flip');vibrate(20);player.rotTarget-=Math.PI;emitParts(player.x,player.y,10,tc('ply'),3,2.5);}
    else{player.gDir=1;player.vy=2;totalFlips++;sfx('flip');vibrate(20);player.rotTarget+=Math.PI;emitParts(player.x,player.y,10,tc('ply'),3,2.5);}
  }
  if(e.code==='Escape'&&state===ST.STAGE_SEL) state=ST.TITLE;
});

function handleTitleTouch(tx,ty){
  const cols=3,rows=2,charW=58,charH=62,charGap=10;
  const gridW=cols*(charW+charGap)-charGap,gridX=W/2-gridW/2,gridY=H*0.38;
  for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){const idx=r*cols+c;if(idx>=CHARS.length)break;
    const cx=gridX+c*(charW+charGap),cy=gridY+r*(charH+charGap);
    if(tx>=cx-5&&tx<=cx+charW+5&&ty>=cy-5&&ty<=cy+charH+5){selChar=idx;localStorage.setItem('gd5char',selChar.toString());return;}
  }}
  const btnW=140,btnH=38,btnX=W/2-btnW/2,btnY1=H*0.72,btnY2=btnY1+btnH+12;
  if(tx>=btnX&&tx<=btnX+btnW&&ty>=btnY1&&ty<=btnY1+btnH){state=ST.PLAY;reset();return;}
  if(tx>=btnX&&tx<=btnX+btnW&&ty>=btnY2&&ty<=btnY2+btnH){state=ST.STAGE_SEL;stageScrollY=0;return;}
}

function handleStageSelTouch(tx,ty){
  if(selScrolling)return;
  if(tx<60&&ty<60+safeTop){state=ST.TITLE;return;}
  const cardH=130,cardGap=14,startY=55+safeTop-stageScrollY;
  for(let pi=0;pi<STAGE_PACKS.length;pi++){
    const pack=STAGE_PACKS[pi],cy=startY+pi*(cardH+cardGap);
    if(ty<cy||ty>cy+cardH)continue;
    if(bigCoins<pack.unlock){sfx('locked');vibrate(15);addPop(W/2,ty,'\u30ED\u30C3\u30AF\u4E2D','#ff4444');return;}
    const sbW=44,sbGap=8,totalSbW=5*(sbW+sbGap)-sbGap,sbX=W/2-totalSbW/2,sbY=cy+46;
    for(let si=0;si<5;si++){const sx=sbX+si*(sbW+sbGap);
      if(tx>=sx-4&&tx<=sx+sbW+4&&ty>=sbY-4&&ty<=sbY+sbW+4){state=ST.STAGE_PLAY;resetStage(pi,si);return;}
    }
  }
}

// ===== COLLISION =====
function die(){
  if(itemEff.shield>0){itemEff.shield=0;shakeI=6;emitParts(player.x,player.y,15,'#3b82f6',4,3);return;}
  if(itemEff.ghost>0)return;
  player.alive=false;state=ST.DEAD;deadT=0;shakeI=14;player.face='dead';sfx('death');vibrate([30,20,50]);
  if(!isStageMode&&score>highScore){highScore=score;newHi=true;localStorage.setItem('gd5hi',highScore.toString());}
  played++;localStorage.setItem('gd5plays',played.toString());
  for(let i=0;i<35;i++){const a=(6.28/35)*i,s=2+Math.random()*6;parts.push({x:player.x,y:player.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35+Math.random()*25,ml:60,sz:Math.random()*6+2,col:i%3===0?CHARS[selChar].col:i%3===1?tc('obs'):'#fff'});}
}
function checkMile(){
  if(isStageMode)return;
  const ms=[25,50,100,150,200,300,500];
  for(const m of ms){if(score>=m&&lastMile<m){lastMile=m;mileTxt=m+' \u30DD\u30A4\u30F3\u30C8\uFF01';mileT=100;sfx('milestone');shakeI=5;vibrate(40);
    const ti=ms.indexOf(m);if(ti<THEMES.length&&ti!==curTheme){prevTheme=curTheme;curTheme=ti;themeLerp=0;}
    for(let i=0;i<25;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*3,vy:Math.random()*3+1,life:50+Math.random()*30,ml:80,sz:Math.random()*5+2,col:['#ff3860','#00e5ff','#ffd700','#a855f7','#34d399'][i%5]});break;}}
}
function applyItem(type){
  sfx('item');vibrate(25);
  switch(type){
    case 0:itemEff.shield=ITEMS[0].dur;break;case 1:itemEff.slow=ITEMS[1].dur;break;case 2:itemEff.magnet=ITEMS[2].dur;break;
    case 3:itemEff.double=ITEMS[3].dur;break;case 4:itemEff.mini=ITEMS[4].dur;break;case 5:itemEff.spring=ITEMS[5].dur;break;
    case 6:itemEff.ghost=ITEMS[6].dur;break;
    case 7:for(let i=0;i<15;i++)coins.push({x:player.x+50+Math.random()*200,y:player.y-100+Math.random()*200,sz:9,col:false,p:Math.random()*6.28});break;
    case 8:itemEff.timestop=ITEMS[8].dur;break;case 9:itemEff.rocket=ITEMS[9].dur;break;
  }
}

// ===== AMBIENT PARTICLES =====
function updateAmbient(){
  if(!isStageMode){ambientParts=[];return;}
  const pt=STAGE_THEMES[currentPackIdx].partType,col=STAGE_THEMES[currentPackIdx].partCol;
  if(ambientParts.length<40&&frame%4===0){
    if(pt==='snow')ambientParts.push({x:Math.random()*W,y:-5,vx:(Math.random()-0.5)*0.8-speed*0.2,vy:1+Math.random()*1.5,sz:2+Math.random()*3,a:0.3+Math.random()*0.4,col});
    else if(pt==='ember')ambientParts.push({x:Math.random()*W,y:H+5,vx:(Math.random()-0.5)*0.5,vy:-(1.5+Math.random()*2),sz:1.5+Math.random()*2.5,a:0.5+Math.random()*0.4,col});
    else if(pt==='bubble')ambientParts.push({x:Math.random()*W,y:H+5,vx:(Math.random()-0.5)*0.3,vy:-(0.8+Math.random()*1.2),sz:3+Math.random()*5,a:0.2+Math.random()*0.3,col,wobble:Math.random()*6.28});
    else if(pt==='petal')ambientParts.push({x:W+5,y:Math.random()*H,vx:-(1+Math.random()*1.5+speed*0.3),vy:0.5+Math.random()*1,sz:3+Math.random()*4,a:0.3+Math.random()*0.4,col,rot:Math.random()*6.28,rs:0.03+Math.random()*0.05});
  }
  ambientParts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.wobble!==undefined){p.wobble+=0.05;p.x+=Math.sin(p.wobble)*0.3;}if(p.rot!==undefined)p.rot+=p.rs;p.a-=0.002;});
  ambientParts=ambientParts.filter(p=>p.a>0&&p.x>-20&&p.x<W+20&&p.y>-20&&p.y<H+20);
}

// ===== UPDATE =====
let lastTime=0;
function update(dt){
  frame++;
  if(themeLerp<1)themeLerp=Math.min(1,themeLerp+0.015);
  if(shakeI>0){shakeX=(Math.random()-0.5)*shakeI;shakeY=(Math.random()-0.5)*shakeI;shakeI*=0.88;if(shakeI<0.3){shakeI=0;shakeX=0;shakeY=0;}}
  if(comboT>0){comboT--;if(comboT===0)combo=0;}
  if(comboDspT>0)comboDspT--;
  if(mileT>0)mileT--;
  if(stageNameT>0)stageNameT--;
  pops=pops.filter(p=>{p.y-=1.2;p.life--;return p.life>0;});

  if(state===ST.TITLE||state===ST.STAGE_SEL){
    titleT+=0.03;
    if(state===ST.STAGE_SEL){stageScrollY+=stageScrollVel*0.3;stageScrollVel*=0.92;const mx=Math.max(0,STAGE_PACKS.length*144-H+100);stageScrollY=Math.max(0,Math.min(mx,stageScrollY));}
    stars.forEach(s=>{s.x-=s.sp*0.5;s.tw+=s.ts;if(s.x<-5)s.x=W+5;});
    mtns.forEach(m=>{m.off-=m.sp*0.3;if(m.off<-500)m.off+=500;});
    return;
  }
  if(state===ST.STAGE_CLEAR){
    stageClearT++;
    if(stageClearT<80&&stageClearT%3===0){for(let i=0;i<3;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*3,vy:Math.random()*3+1,life:50+Math.random()*30,ml:80,sz:Math.random()*5+2,col:['#ffd700','#ff3860','#00e5ff','#a855f7','#34d399'][i%5]});}
    parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;return p.life>0;});return;
  }
  if(state===ST.DEAD){deadT++;parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.vx*=0.99;p.life--;return p.life>0;});stars.forEach(s=>{s.x-=s.sp*0.15;s.tw+=s.ts;if(s.x<-5)s.x=W+5;});return;}

  // === PLAYING ===
  for(const k in itemEff)if(itemEff[k]>0)itemEff[k]--;
  const sm=itemEff.slow>0?0.55:1,rm=itemEff.rocket>0?2.2:1,ts=itemEff.timestop>0?0.15:1;
  speed=isStageMode?(SPEED_INIT*currentStageData.spdMul)*sm*rm*ts:Math.min(SPEED_MAX,(SPEED_INIT+dist*SPEED_INC))*sm*rm*ts;

  const scoreMul=itemEff.double>0?2:1;
  dist+=speed*0.08*scoreMul;
  const ns=Math.floor(dist);if(ns>score){score=ns;checkMile();}

  // Stage clear
  if(isStageMode&&dist>=currentStageData.dist){
    state=ST.STAGE_CLEAR;stageClearT=0;gotNewBigCoin=false;
    if(!stageProgress[currentStageData.id]){stageProgress[currentStageData.id]=true;bigCoins=Object.keys(stageProgress).length;localStorage.setItem('gd5sp',JSON.stringify(stageProgress));gotNewBigCoin=true;}
    sfx('stageclear');vibrate(40);shakeI=8;
    for(let i=0;i<40;i++)parts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*4,vy:Math.random()*4+1,life:60+Math.random()*30,ml:90,sz:Math.random()*6+2,col:['#ffd700','#ff3860','#00e5ff','#a855f7','#34d399'][i%5]});return;
  }

  terrainOffset+=speed;terrainFloor.forEach(s=>s.x-=speed);terrainCeil.forEach(s=>s.x-=speed);
  while(terrainFloor.length>0&&terrainFloor[0].x<-SEG_W*2)terrainFloor.shift();
  while(terrainCeil.length>0&&terrainCeil[0].x<-SEG_W*2)terrainCeil.shift();
  const lastF=terrainFloor[terrainFloor.length-1],lastC=terrainCeil[terrainCeil.length-1];
  if(lastF&&lastF.x<W+200)generateTerrain(terrainFloor,true,lastF.x+SEG_W,15,stageRng);
  if(lastC&&lastC.x<W+200)generateTerrain(terrainCeil,false,lastC.x+SEG_W,15,stageRng);

  trySpawnCoins();trySpawnItem();updateAmbient();

  const pr=itemEff.mini>0?PLAYER_R*0.6:PLAYER_R;
  player.vy+=GRAVITY*player.gDir;player.vy=Math.max(-14,Math.min(14,player.vy));
  if(itemEff.rocket>0){player.vy*=0.7;if(frame%2===0)emitParts(player.x-10,player.y,2,'#f97316',3,1);}
  player.y+=player.vy;

  player.grounded=false;
  if(player.gDir===1){const sy=floorSurfaceY(player.x);if(player.y+pr>=sy){player.y=sy-pr;player.vy=0;player.grounded=true;}}
  else{const sy=ceilSurfaceY(player.x);if(player.y-pr<=sy){player.y=sy+pr;player.vy=0;player.grounded=true;}}

  const fS=floorSurfaceY(player.x),cS=ceilSurfaceY(player.x);
  if(fS-cS<pr*2+4){die();return;}
  if(player.y+pr>H+30||player.y-pr<-30){die();return;}
  player.rot+=(player.rotTarget-player.rot)*0.12;
  player.trail.push({x:player.x,y:player.y,a:1});if(player.trail.length>14)player.trail.shift();player.trail.forEach(t=>t.a-=0.075);

  coins.forEach(c=>{c.x-=speed;c.p+=0.08;if(!c.col){let cd=pr+c.sz;
    if(itemEff.magnet>0){const dx=player.x-c.x,dy=player.y-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d<180){c.x+=dx*0.12;c.y+=dy*0.12;}cd*=1.8;}
    const dx=player.x-c.x,dy=player.y-c.y;if(Math.sqrt(dx*dx+dy*dy)<cd){c.col=true;totalCoins++;combo++;comboT=100;comboDsp=combo;comboDspT=55;if(combo>maxCombo)maxCombo=combo;
      const bon=(3+Math.min(combo-1,8))*(itemEff.double>0?2:1);dist+=bon;sfx(combo>1?'combo':'coin');addPop(c.x,c.y-14,'+'+bon,'#ffd700');vibrate(10);if(combo>1)addPop(c.x,c.y-34,combo+'x','#ff6b35');emitParts(c.x,c.y,6,'#ffd700',3,2);player.face='happy';setTimeout(()=>{if(player.alive)player.face='normal';},250);}}});
  coins=coins.filter(c=>c.x>-50&&!c.col);

  items.forEach(it=>{it.x-=speed;it.p+=0.06;if(!it.col){const dx=player.x-it.x,dy=player.y-it.y;if(Math.sqrt(dx*dx+dy*dy)<pr+it.sz){it.col=true;applyItem(it.t);addPop(it.x,it.y-18,ITEMS[it.t].name+'!',ITEMS[it.t].col);emitParts(it.x,it.y,12,ITEMS[it.t].col,4,3);player.face='happy';setTimeout(()=>{if(player.alive)player.face='normal';},300);}}});
  items=items.filter(it=>it.x>-50&&!it.col);

  if(itemEff.ghost<=0&&itemEff.shield<=0){const ah=player.gDir===1?floorSurfaceY(player.x+pr):ceilSurfaceY(player.x+pr);if(player.gDir===1&&player.y+pr>ah+pr*0.7&&player.grounded){const am=floorSurfaceY(player.x+pr+10);if(ah-am>12){die();return;}}}

  if(itemEff.shield>0&&frame%3===0){const a=Math.random()*6.28;parts.push({x:player.x+Math.cos(a)*18,y:player.y+Math.sin(a)*18,vx:Math.cos(a)*0.4,vy:Math.sin(a)*0.4,life:12,ml:12,sz:Math.random()*3+1,col:'#3b82f6'});}
  if(itemEff.ghost>0&&frame%4===0)parts.push({x:player.x-8+Math.random()*16,y:player.y+pr,vx:0,vy:0.5,life:15,ml:15,sz:2,col:'#8b5cf688'});
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
  stars.forEach(s=>{s.x-=s.sp*speed*0.3;s.tw+=s.ts;if(s.x<-5)s.x=W+5;});
  mtns.forEach(m=>{m.off-=m.sp*speed*0.15;if(m.off<-500)m.off+=500;});
}

// ===== DRAW =====
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function drawTerrainSurface(arr,isFloor){
  if(arr.length<2)return;ctx.beginPath();
  if(isFloor){ctx.moveTo(arr[0].x,H-arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,H-arr[i].h);ctx.lineTo(arr[arr.length-1].x,H+10);ctx.lineTo(arr[0].x,H+10);}
  else{ctx.moveTo(arr[0].x,arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,arr[i].h);ctx.lineTo(arr[arr.length-1].x,-10);ctx.lineTo(arr[0].x,-10);}
  ctx.closePath();const gr=ctx.createLinearGradient(0,isFloor?H-80:0,0,isFloor?H:80);gr.addColorStop(0,tc('gnd'));gr.addColorStop(1,tc('gnd2'));ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();if(isFloor){ctx.moveTo(arr[0].x,H-arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,H-arr[i].h);}else{ctx.moveTo(arr[0].x,arr[0].h);for(let i=1;i<arr.length;i++)ctx.lineTo(arr[i].x,arr[i].h);}
  ctx.strokeStyle=tc('line');ctx.lineWidth=2;ctx.shadowColor=tc('line');ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;
}

function drawAmbient(){ambientParts.forEach(p=>{ctx.globalAlpha=p.a;ctx.fillStyle=p.col;if(p.rot!==undefined){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.beginPath();ctx.ellipse(0,0,p.sz,p.sz*0.5,0,0,6.28);ctx.fill();ctx.restore();}else{ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,6.28);ctx.fill();}});ctx.globalAlpha=1;}

function drawCharacter(x,y,ci,r,rot,alpha,face){
  const ch=CHARS[ci];ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;
  const gr=ctx.createRadialGradient(0,0,0,0,0,r);gr.addColorStop(0,ch.col);gr.addColorStop(1,ch.col2);
  switch(ch.shape){
    case'cube':ctx.fillStyle=gr;rr(-r,-r,r*2,r*2,r*0.3);ctx.fill();break;
    case'ball':ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,0,r,0,6.28);ctx.fill();break;
    case'star':ctx.fillStyle=gr;ctx.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*6.28/5;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);const a2=a+6.28/10;ctx.lineTo(Math.cos(a2)*r*0.45,Math.sin(a2)*r*0.45);}ctx.closePath();ctx.fill();break;
    case'ghost':ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,-r*0.15,r,Math.PI,0);ctx.lineTo(r,r);for(let i=0;i<4;i++){const bx=r-i*(r*2/4)-r*2/8;ctx.quadraticCurveTo(bx+r/8,r-r*0.35,bx-r/8,r);}ctx.closePath();ctx.fill();break;
    case'ninja':ctx.fillStyle=gr;rr(-r,-r,r*2,r*2,r*0.25);ctx.fill();ctx.fillStyle='#1a1a1a';ctx.fillRect(-r*1.1,-r*0.1,r*2.2,r*0.35);break;
    case'flame':ctx.fillStyle=gr;ctx.beginPath();ctx.arc(0,r*0.15,r*0.85,0,6.28);ctx.fill();ctx.fillStyle=ch.col;for(let i=0;i<3;i++){const fx=-r*0.4+i*r*0.4,fy=-r*0.7-Math.sin(frame*0.15+i)*r*0.3;ctx.beginPath();ctx.moveTo(fx-r*0.2,0);ctx.quadraticCurveTo(fx,fy,fx+r*0.2,0);ctx.fill();}break;
  }
  const eY=face==='dead'?0:-r*0.15;
  if(face==='dead'){ctx.strokeStyle=ch.eye;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(r*0.05,eY-r*0.15);ctx.lineTo(r*0.35,eY+r*0.15);ctx.stroke();ctx.beginPath();ctx.moveTo(r*0.35,eY-r*0.15);ctx.lineTo(r*0.05,eY+r*0.15);ctx.stroke();}
  else{ctx.fillStyle=ch.eye;ctx.beginPath();ctx.arc(r*0.2,eY,r*0.28,0,6.28);ctx.fill();ctx.fillStyle=ch.pupil;ctx.beginPath();ctx.arc(r*0.28,eY,r*0.14,0,6.28);ctx.fill();ctx.fillStyle=ch.eye;ctx.beginPath();ctx.arc(r*0.33,eY-r*0.1,r*0.06,0,6.28);ctx.fill();if(face==='happy'){ctx.strokeStyle=ch.eye;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(r*0.15,eY+r*0.3,r*0.15,0.2,Math.PI-0.2);ctx.stroke();}}
  ctx.restore();
}

function drawBigCoin(x,y,sz){
  ctx.save();ctx.translate(x,y);const sx=Math.cos(frame*0.04)*sz;ctx.scale(Math.abs(sx)/sz||0.01,1);
  ctx.shadowColor='#ffd70088';ctx.shadowBlur=12;ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(0,0,sz,0,6.28);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#ffee55';ctx.beginPath();ctx.arc(-sz*0.15,-sz*0.15,sz*0.4,0,6.28);ctx.fill();
  ctx.fillStyle='#cc9900';ctx.font='bold '+Math.floor(sz*0.9)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u2605',0,1);ctx.textBaseline='alphabetic';ctx.restore();
}

function draw(){
  ctx.save();ctx.translate(shakeX,shakeY);

  stars.forEach(s=>{ctx.globalAlpha=s.a*(0.6+Math.sin(s.tw)*0.4);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,6.28);ctx.fill();});ctx.globalAlpha=1;

  items.forEach(it=>{const pl=Math.sin(it.p)*0.15+1,sz=it.sz*pl,col=ITEMS[it.t].col;ctx.shadowColor=col+'77';ctx.shadowBlur=16;ctx.fillStyle=col;ctx.save();ctx.translate(it.x,it.y);ctx.rotate(Math.PI/4+it.p*0.3);rr(-sz/2,-sz/2,sz,sz,3);ctx.fill();ctx.shadowBlur=0;ctx.rotate(-(Math.PI/4+it.p*0.3));ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ITEMS[it.t].icon,0,1);ctx.textBaseline='alphabetic';ctx.restore();});

  player.trail.forEach(t=>{if(t.a<=0)return;ctx.globalAlpha=t.a*0.15;ctx.fillStyle=CHARS[selChar].col;const s=PLAYER_R*(0.3+t.a*0.5);ctx.beginPath();ctx.arc(t.x,t.y,s,0,6.28);ctx.fill();});ctx.globalAlpha=1;
  if(player.alive){
    const pr=itemEff.mini>0?PLAYER_R*0.6:PLAYER_R,ga=itemEff.ghost>0?0.4+Math.sin(frame*0.15)*0.15:1;
    if(itemEff.shield>0){ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.globalAlpha=itemEff.shield<70?0.3+Math.sin(frame*0.3)*0.3:0.55;ctx.beginPath();ctx.arc(player.x,player.y,pr+8,0,6.28);ctx.stroke();ctx.globalAlpha=1;}
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.lineCap='round';const ay=player.gDir===1?pr+6:-pr-6,ad=player.gDir;ctx.beginPath();ctx.moveTo(player.x-5,player.y+ay-3*ad);ctx.lineTo(player.x,player.y+ay+3*ad);ctx.lineTo(player.x+5,player.y+ay-3*ad);ctx.stroke();ctx.lineCap='butt';
    drawCharacter(player.x,player.y,selChar,pr,player.rot,ga,player.face);
  }
  parts.forEach(p=>{ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,6.28);ctx.fill();});ctx.globalAlpha=1;

  // UI
  ctx.fillStyle='#fff';ctx.font='bold 34px monospace';ctx.textAlign='center';ctx.shadowColor='#fff3';ctx.shadowBlur=8;ctx.fillText(score,W/2,42);ctx.shadowBlur=0;
  ctx.fillStyle='#8899aa';ctx.font='11px monospace';ctx.textAlign='left';ctx.fillText('\u901F\u5EA6 '+speed.toFixed(1),10,22);ctx.fillText('\u25CF '+totalCoins,10,38);
  if(comboDspT>0&&comboDsp>1){const a=comboDspT/55,sc=1+(1-a)*0.25;ctx.globalAlpha=a;ctx.save();ctx.translate(W/2,72);ctx.scale(sc,sc);ctx.fillStyle='#ff6b35';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillText(comboDsp+'x \u30B3\u30F3\u30DC',0,0);ctx.restore();ctx.globalAlpha=1;}
  const ai=[];if(itemEff.shield>0)ai.push({n:'\u30B7\u30FC\u30EB\u30C9',c:'#3b82f6',t:itemEff.shield,m:300});if(itemEff.slow>0)ai.push({n:'\u30B9\u30ED\u30FC',c:'#a855f7',t:itemEff.slow,m:250});if(itemEff.magnet>0)ai.push({n:'\u30DE\u30B0\u30CD\u30C3\u30C8',c:'#f59e0b',t:itemEff.magnet,m:350});if(itemEff.double>0)ai.push({n:'x2',c:'#ef4444',t:itemEff.double,m:280});if(itemEff.mini>0)ai.push({n:'\u30DF\u30CB',c:'#06b6d4',t:itemEff.mini,m:260});if(itemEff.spring>0)ai.push({n:'\u30D0\u30CD',c:'#84cc16',t:itemEff.spring,m:300});if(itemEff.ghost>0)ai.push({n:'\u30B4\u30FC\u30B9\u30C8',c:'#8b5cf6',t:itemEff.ghost,m:200});if(itemEff.timestop>0)ai.push({n:'\u6642\u9593\u505C\u6B62',c:'#ec4899',t:itemEff.timestop,m:120});if(itemEff.rocket>0)ai.push({n:'\u30ED\u30B1\u30C3\u30C8',c:'#f97316',t:itemEff.rocket,m:150});
  ai.forEach((d,i)=>{const y=18+i*18,x=W-8,bw=50,r=d.t/d.m;ctx.textAlign='right';ctx.fillStyle=d.c;ctx.font='bold 9px monospace';ctx.fillText(d.n,x-bw-4,y+3);ctx.fillStyle='#ffffff12';rr(x-bw,y-3,bw,7,3);ctx.fill();ctx.fillStyle=d.c;rr(x-bw,y-3,bw*r,7,3);ctx.fill();});

  if(isStageMode&&currentStageData){const prog=Math.min(1,dist/currentStageData.dist);ctx.fillStyle='#ffffff15';ctx.fillRect(0,2,W,4);ctx.fillStyle=tc('ply');ctx.shadowColor=tc('ply');ctx.shadowBlur=6;ctx.fillRect(0,2,W*prog,4);ctx.shadowBlur=0;
    if(stageNameT>0){const a=stageNameT>100?1:stageNameT/100;ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(STAGE_PACKS[currentPackIdx].name+' - '+currentStageData.name,W/2,H*0.12);ctx.fillStyle='#fff8';ctx.font='11px monospace';ctx.fillText('\u76EE\u6A19: '+currentStageData.dist+'m',W/2,H*0.12+18);ctx.globalAlpha=1;}}

  pops.forEach(p=>{const a=p.life/p.ml;ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y);});ctx.globalAlpha=1;
  if(mileT>0){const p=mileT/100;let a,sc;if(p>0.85){const t=(p-0.85)/0.15;a=1-t;sc=0.5+a*0.5;}else if(p>0.2){a=1;sc=1;}else{a=p/0.2;sc=1+(1-a)*0.25;}ctx.save();ctx.globalAlpha=a;ctx.translate(W/2,H*0.5);ctx.scale(sc,sc);ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd70077';ctx.shadowBlur=22;ctx.font='bold 36px monospace';ctx.textAlign='center';ctx.fillText(mileTxt,0,0);ctx.shadowBlur=0;ctx.fillStyle='#fff7';ctx.font='13px monospace';ctx.fillText(THEMES[curTheme].n,0,28);ctx.restore();ctx.globalAlpha=1;}
  if(state===ST.DEAD){drawDead();}
  if(state===ST.STAGE_CLEAR){drawStageClear();}
  ctx.restore();
}

    const sbW=44,sbGap=8,totalSbW=5*(sbW+sbGap)-sbGap,sbX=W/2-totalSbW/2,sbY=cy+46;
    for(let si=0;si<5;si++){const stage=pack.stages[si],sx=sbX+si*(sbW+sbGap),isClear=stageProgress[stage.id];
      if(isClear){ctx.fillStyle='#ffd70033';rr(sx,sbY,sbW,sbW,8);ctx.fill();ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;rr(sx,sbY,sbW,sbW,8);ctx.stroke();ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText('\u2713',sx+sbW/2,sbY+sbW/2+6);}
      else{const pulse=Math.sin(frame*0.06+si)*0.3+0.7;ctx.fillStyle='#ffffff08';rr(sx,sbY,sbW,sbW,8);ctx.fill();ctx.strokeStyle='rgba(255,255,255,'+pulse*0.6+')';ctx.lineWidth=1.5;rr(sx,sbY,sbW,sbW,8);ctx.stroke();ctx.fillStyle='rgba(255,255,255,'+pulse+')';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(''+(si+1),sx+sbW/2,sbY+sbW/2+5);}
      ctx.fillStyle='#fff6';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(stage.name,sx+sbW/2,sbY+sbW+10);}}
  ctx.restore();
}

function drawStageClear(){
  const oa=Math.min(stageClearT/40,0.7);ctx.fillStyle='rgba(0,0,0,'+oa+')';ctx.fillRect(-20,-20,W+40,H+40);if(stageClearT<15)return;
  const si=Math.min((stageClearT-15)/20,1),e=1-Math.pow(1-si,3);ctx.save();ctx.translate(0,-50*(1-e));ctx.globalAlpha=e;
  ctx.fillStyle='#ffd700';ctx.font='bold 36px monospace';ctx.textAlign='center';ctx.shadowColor='#ffd70077';ctx.shadowBlur=22;ctx.fillText('\u30B9\u30C6\u30FC\u30B8\u30AF\u30EA\u30A2\uFF01',W/2,H*0.2);ctx.shadowBlur=0;
  ctx.fillStyle='#fff8';ctx.font='13px monospace';ctx.fillText(STAGE_PACKS[currentPackIdx].name+' - '+currentStageData.name,W/2,H*0.28);
  const cardY=H*0.32,cardH=180;ctx.fillStyle='#0008';rr(W/2-125,cardY,250,cardH,14);ctx.fill();ctx.strokeStyle='#ffd70044';ctx.lineWidth=1;rr(W/2-125,cardY,250,cardH,14);ctx.stroke();
  drawCharacter(W/2,cardY+35,selChar,18,0,1,'happy');ctx.fillStyle='#fff';ctx.font='bold 28px monospace';ctx.textAlign='center';ctx.fillText(score+'m',W/2,cardY+75);
  ctx.fillStyle='#fff6';ctx.font='11px monospace';ctx.fillText('\u30B3\u30A4\u30F3: '+totalCoins+'  \u53CD\u8EE2: '+totalFlips,W/2,cardY+100);
  if(maxCombo>1){ctx.fillStyle='#ff6b35aa';ctx.fillText('\u6700\u5927\u30B3\u30F3\u30DC: '+maxCombo+'x',W/2,cardY+118);}
  if(gotNewBigCoin&&stageClearT>30){const ba=Math.min((stageClearT-30)/20,1),bs=1+Math.sin(stageClearT*0.08)*0.1;ctx.globalAlpha=ba*e;ctx.save();ctx.translate(W/2,cardY+148);ctx.scale(bs,bs);drawBigCoin(0,0,16);ctx.fillStyle='#ffd700';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText('+1',28,6);ctx.restore();ctx.globalAlpha=e;}
  else if(!gotNewBigCoin){ctx.fillStyle='#fff3';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('\u30AF\u30EA\u30A2\u6E08\u307F',W/2,cardY+150);}
  if(stageClearT>60){const ta=Math.sin(stageClearT*0.07)*0.3+0.7;ctx.globalAlpha=ta*e;ctx.fillStyle='#fff';ctx.font='bold 15px monospace';ctx.fillText('\u30BF\u30C3\u30D7\u3067\u7D9A\u3051\u308B',W/2,H*0.85);}
  ctx.restore();ctx.globalAlpha=1;
  parts.forEach(p=>{ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,6.28);ctx.fill();});ctx.globalAlpha=1;
}

function drawDead(){
  const oa=Math.min(deadT/40,0.65);ctx.fillStyle='rgba(0,0,0,'+oa+')';ctx.fillRect(-20,-20,W+40,H+40);if(deadT<15)return;
  const si=Math.min((deadT-15)/20,1),e=1-Math.pow(1-si,3);ctx.save();ctx.translate(0,-55*(1-e));ctx.globalAlpha=e;
  ctx.fillStyle=tc('obs');ctx.font='bold 40px monospace';ctx.textAlign='center';ctx.shadowColor=tc('obs')+'55';ctx.shadowBlur=22;ctx.fillText('\u30B2\u30FC\u30E0\u30AA\u30FC\u30D0\u30FC',W/2,H*0.22);ctx.shadowBlur=0;
  const cardY=H*0.27,ch=200;ctx.fillStyle='#0008';rr(W/2-125,cardY,250,ch,14);ctx.fill();ctx.strokeStyle='#fff1';ctx.lineWidth=1;rr(W/2-125,cardY,250,ch,14);ctx.stroke();
  drawCharacter(W/2,cardY+35,selChar,18,0,1,'dead');ctx.fillStyle='#fff7';ctx.font='13px monospace';ctx.textAlign='center';ctx.fillText('\u30B9\u30B3\u30A2',W/2,cardY+65);
  ctx.fillStyle='#fff';ctx.font='bold 44px monospace';ctx.shadowColor='#fff3';ctx.shadowBlur=12;ctx.fillText(score,W/2,cardY+108);ctx.shadowBlur=0;
  if(!isStageMode&&newHi){const np=Math.sin(deadT*0.12)*0.3+0.7;ctx.globalAlpha=np*e;ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';ctx.shadowColor='#ffd70055';ctx.shadowBlur=10;ctx.fillText('\u65B0\u8A18\u9332\uFF01',W/2,cardY-6);ctx.shadowBlur=0;ctx.globalAlpha=e;}
  ctx.fillStyle='#fff5';ctx.font='11px monospace';
  if(isStageMode){ctx.fillText(STAGE_PACKS[currentPackIdx].name+' - '+currentStageData.name,W/2,cardY+130);ctx.fillStyle='#fff4';ctx.fillText('\u76EE\u6A19: '+currentStageData.dist+'m  \u9054\u6210: '+score+'m',W/2,cardY+146);}
  else{ctx.fillText('\u30D9\u30B9\u30C8: '+highScore,W/2,cardY+130);}
  if(maxCombo>1){ctx.fillStyle='#ff6b35aa';ctx.fillText('\u6700\u5927\u30B3\u30F3\u30DC: '+maxCombo+'x',W/2,cardY+162);}
  ctx.fillStyle='#fff4';ctx.fillText('\u30B3\u30A4\u30F3: '+totalCoins+'  \u53CD\u8EE2: '+totalFlips,W/2,cardY+178);
  if(deadT>45){const ta=Math.sin(deadT*0.07)*0.3+0.7;ctx.globalAlpha=ta*e;ctx.fillStyle='#fff';ctx.font='bold 15px monospace';ctx.fillText(isStageMode?'\u30BF\u30C3\u30D7\u3067\u30B9\u30C6\u30FC\u30B8\u9078\u629E\u3078':'\u30BF\u30C3\u30D7\u3067\u7D9A\u3051\u308B',W/2,H*0.82);}
  ctx.restore();ctx.globalAlpha=1;
}

function loop(ts){if(!lastTime)lastTime=ts;const dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;update(dt);draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
