  if(itemEff.timestop>0)ai.push({n:'\u6642\u9593\u505C\u6B62',c:'#ec4899',t:itemEff.timestop,m:120});
  if(itemEff.rocket>0)ai.push({n:'\u30ED\u30B1\u30C3\u30C8',c:'#f97316',t:itemEff.rocket,m:150});
  ai.forEach((d,i)=>{const y=18+i*18,x=W-8,bw=50,r=d.t/d.m;ctx.textAlign='right';ctx.fillStyle=d.c;ctx.font='bold 9px monospace';ctx.fillText(d.n,x-bw-4,y+3);ctx.fillStyle='#ffffff12';rr(x-bw,y-3,bw,7,3);ctx.fill();ctx.fillStyle=d.c;rr(x-bw,y-3,bw*r,7,3);ctx.fill();if(d.t<60){ctx.globalAlpha=Math.sin(frame*0.2)*0.5+0.5;ctx.fillStyle=d.c;rr(x-bw,y-3,bw*r,7,3);ctx.fill();ctx.globalAlpha=1;}});
}

function drawStageProgress(){
  if(!currentStageData)return;
  const prog=Math.min(1,dist/currentStageData.dist);
  const barH=4,barY=2;
  ctx.fillStyle='#ffffff15';ctx.fillRect(0,barY,W,barH);
  ctx.fillStyle=tc('ply');ctx.shadowColor=tc('ply');ctx.shadowBlur=6;ctx.fillRect(0,barY,W*prog,barH);ctx.shadowBlur=0;
  // Stage name display
  if(stageNameT>0){
    const a=stageNameT>100?1:(stageNameT/100);
    ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText(STAGE_PACKS[currentPackIdx].name+' - '+currentStageData.name,W/2,H*0.12);
    ctx.fillStyle='#fff8';ctx.font='11px monospace';
    ctx.fillText('\u76EE\u6A19: '+currentStageData.dist+'m',W/2,H*0.12+18);
    ctx.globalAlpha=1;
  }
}

function drawMile(){
  const p=mileT/100;let a,sc;
  if(p>0.85){const t=(p-0.85)/0.15;a=1-t;sc=0.5+a*0.5;}
  else if(p>0.2){a=1;sc=1;}else{a=p/0.2;sc=1+(1-a)*0.25;}
  ctx.save();ctx.globalAlpha=a;ctx.translate(W/2,H*0.5);ctx.scale(sc,sc);
  ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd70077';ctx.shadowBlur=22;
  ctx.font='bold 36px monospace';ctx.textAlign='center';ctx.fillText(mileTxt,0,0);ctx.shadowBlur=0;
  ctx.fillStyle='#fff7';ctx.font='13px monospace';ctx.fillText(THEMES[curTheme].n,0,28);
  ctx.restore();ctx.globalAlpha=1;
}

function drawBigCoin(x,y,sz){
  ctx.save();ctx.translate(x,y);
  const rot=frame*0.04;
  const sx=Math.cos(rot)*sz;
  ctx.scale(Math.abs(sx)/sz||0.01,1);
  ctx.shadowColor='#ffd70088';ctx.shadowBlur=12;
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(0,0,sz,0,6.28);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffee55';ctx.beginPath();ctx.arc(-sz*0.15,-sz*0.15,sz*0.4,0,6.28);ctx.fill();
  ctx.fillStyle='#cc9900';ctx.font='bold '+Math.floor(sz*0.9)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('\u2605',0,1);ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawTitle(){
  const p=Math.sin(titleT)*0.035+1;
  ctx.save();ctx.translate(W/2,H*0.15);ctx.scale(p,p);
  ctx.shadowColor='#00e5ff44';ctx.shadowBlur=35;ctx.fillStyle='#00e5ff';
  ctx.font='bold 40px monospace';ctx.textAlign='center';ctx.fillText('\u30B0\u30E9\u30D3\u30C6\u30A3',0,0);
  ctx.shadowColor='#ff386044';ctx.fillStyle='#ff3860';ctx.fillText('\u30C0\u30C3\u30B7\u30E5',0,44);ctx.shadowBlur=0;
  ctx.restore();

  ctx.fillStyle='#ffffff33';ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillText('\u91CD\u529B\u53CD\u8EE2\u30A2\u30AF\u30B7\u30E7\u30F3\u30E9\u30F3\u30CA\u30FC',W/2,H*0.15+66);

  // Wallet display
  ctx.fillStyle='#ffd700';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText('\u25CF '+walletCoins,W/2,H*0.38);

  // Character selection: 2 rows x 3 columns
  ctx.fillStyle='#fff8';ctx.font='bold 12px monospace';
  ctx.fillText('\u30AD\u30E3\u30E9\u30AF\u30BF\u30FC\u9078\u629E',W/2,H*0.36);
  const cols=3,rows=2,charW=58,charH=62,charGap=10;
  const gridW=cols*(charW+charGap)-charGap;
  const gridX=W/2-gridW/2,gridY=H*0.38;
  for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
    const idx=r*cols+c;if(idx>=CHARS.length)break;
    const ch=CHARS[idx],cx=gridX+c*(charW+charGap),cy=gridY+r*(charH+charGap);
    if(idx===selChar){ctx.strokeStyle=ch.col;ctx.lineWidth=2;ctx.shadowColor=ch.col;ctx.shadowBlur=8;rr(cx-2,cy-2,charW+4,charH+4,8);ctx.stroke();ctx.shadowBlur=0;}
    ctx.fillStyle=idx===selChar?'#ffffff18':'#ffffff08';rr(cx,cy,charW,charH,6);ctx.fill();
    drawCharacter(cx+charW/2,cy+charH/2-8,idx,14,0,1,'normal');
    ctx.fillStyle=idx===selChar?'#fff':'#fff6';ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText(ch.name,cx+charW/2,cy+charH-4);
  }}

  // Stats
  const statsY=gridY+rows*(charH+charGap)+6;
  if(highScore>0){ctx.fillStyle='#ffd700';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText('\u30D9\u30B9\u30C8: '+highScore,W/2,statsY);}

  // Mode buttons
  const btnW=140,btnH=38,btnX=W/2-btnW/2;
  const btnY1=H*0.72,btnY2=btnY1+btnH+12;

  // Endless button
  ctx.fillStyle='#00e5ff22';rr(btnX,btnY1,btnW,btnH,10);ctx.fill();
  ctx.strokeStyle='#00e5ff';ctx.lineWidth=1.5;rr(btnX,btnY1,btnW,btnH,10);ctx.stroke();
  ctx.fillStyle='#00e5ff';ctx.font='bold 16px monospace';ctx.textAlign='center';
  ctx.fillText('\u30A8\u30F3\u30C9\u30EC\u30B9',W/2,btnY1+btnH/2+6);

  // Stage button
  ctx.fillStyle='#ffd70022';rr(btnX,btnY2,btnW,btnH,10);ctx.fill();
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;rr(btnX,btnY2,btnW,btnH,10);ctx.stroke();
  ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';
  ctx.fillText('\u30B9\u30C6\u30FC\u30B8',W/2-16,btnY2+btnH/2+6);
  // Big coin count
  drawBigCoin(W/2+40,btnY2+btnH/2,10);
  ctx.fillStyle='#ffd700';ctx.font='bold 12px monospace';ctx.textAlign='left';
  ctx.fillText('\u00D7'+bigCoins,W/2+54,btnY2+btnH/2+5);

  ctx.fillStyle='#667';ctx.font='10px monospace';ctx.textAlign='center';
  ctx.fillText('\u30BF\u30C3\u30D7=\u30B8\u30E3\u30F3\u30D7 / \u30B9\u30EF\u30A4\u30D7=\u91CD\u529B\u53CD\u8EE2',W/2,H*0.95);
}

function drawStageSel(){
  // Header
  ctx.fillStyle='#ffffff15';ctx.fillRect(0,0,W,50+safeTop);
  ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.textAlign='center';
  ctx.fillText('\u30B9\u30C6\u30FC\u30B8\u9078\u629E',W/2,30+safeTop);
  // Back button
  ctx.fillStyle='#fff8';ctx.font='bold 22px monospace';ctx.textAlign='left';
  ctx.fillText('\u2190',14,33+safeTop);
  // Big coin count
  drawBigCoin(W-50,28+safeTop,10);
  ctx.fillStyle='#ffd700';ctx.font='bold 13px monospace';ctx.textAlign='left';
  ctx.fillText('\u00D7'+bigCoins,W-36,33+safeTop);

  // Pack cards
  ctx.save();
  ctx.beginPath();ctx.rect(0,50+safeTop,W,H-50-safeTop);ctx.clip();

  const cardX=16,cardW=W-32,cardH=130,cardGap=14;
  const startY=55+safeTop-stageScrollY;

  for(let pi=0;pi<STAGE_PACKS.length;pi++){
    const pack=STAGE_PACKS[pi];
    const cy=startY+pi*(cardH+cardGap);
    if(cy+cardH<50+safeTop||cy>H)continue; // cull off-screen

    const locked=bigCoins<pack.unlock;
    const st=STAGE_THEMES[pack.theme];

    // Card background
    ctx.fillStyle='#0a0a2a88';rr(cardX,cy,cardW,cardH,12);ctx.fill();
    ctx.strokeStyle=locked?'#444':st.line;ctx.lineWidth=locked?1:2;
    if(!locked){ctx.shadowColor=st.line;ctx.shadowBlur=6;}
    rr(cardX,cy,cardW,cardH,12);ctx.stroke();ctx.shadowBlur=0;

    // Pack title row
    const cleared=pack.stages.filter(s=>stageProgress[s.id]).length;
    ctx.fillStyle=locked?'#666':'#fff';ctx.font='bold 16px monospace';ctx.textAlign='left';
    ctx.fillText(pack.icon+' '+pack.name,cardX+14,cy+28);
    ctx.fillStyle=locked?'#555':'#fff8';ctx.font='12px monospace';ctx.textAlign='right';
    ctx.fillText(cleared+'/5',cardX+cardW-14,cy+28);

    if(locked){
      // Lock overlay
      ctx.fillStyle='#0008';rr(cardX,cy,cardW,cardH,12);ctx.fill();
      ctx.fillStyle='#888';ctx.font='bold 26px monospace';ctx.textAlign='center';
      ctx.fillText('\u{1F512}',W/2,cy+65);
      ctx.fillStyle='#ffd700';ctx.font='bold 12px monospace';
      ctx.fillText('\u5927\u30B3\u30A4\u30F3 '+pack.unlock+'\u679A\u3067\u89E3\u653E',W/2,cy+90);
      ctx.fillStyle='#fff4';ctx.font='10px monospace';
      ctx.fillText('\u73FE\u5728: '+bigCoins+' / '+pack.unlock,W/2,cy+106);
      continue;
    }

    // Stage buttons
    const sbW=44,sbGap=8;
    const totalSbW=5*(sbW+sbGap)-sbGap;
    const sbX=W/2-totalSbW/2;
    const sbY=cy+46;

    for(let si=0;si<5;si++){
      const stage=pack.stages[si];
      const sx=sbX+si*(sbW+sbGap);
      const isClear=stageProgress[stage.id];

      if(isClear){
        // Gold filled
        ctx.fillStyle='#ffd70033';rr(sx,sbY,sbW,sbW,8);ctx.fill();
        ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;rr(sx,sbY,sbW,sbW,8);ctx.stroke();
        ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';ctx.textAlign='center';
        ctx.fillText('\u2713',sx+sbW/2,sbY+sbW/2+6);
      }else{
        // Available
        const pulse=Math.sin(frame*0.06+si)*0.3+0.7;
        ctx.fillStyle='#ffffff08';rr(sx,sbY,sbW,sbW,8);ctx.fill();
        ctx.strokeStyle=`rgba(255,255,255,${pulse*0.6})`;ctx.lineWidth=1.5;rr(sx,sbY,sbW,sbW,8);ctx.stroke();
        ctx.fillStyle=`rgba(255,255,255,${pulse})`;ctx.font='bold 14px monospace';ctx.textAlign='center';
        ctx.fillText(''+(si+1),sx+sbW/2,sbY+sbW/2+5);
      }

      // Stage name below button
      ctx.fillStyle='#fff6';ctx.font='8px monospace';ctx.textAlign='center';
      ctx.fillText(stage.name,sx+sbW/2,sbY+sbW+10);
    }
  }
  ctx.restore();

  // Scroll hint
  const maxScroll=Math.max(0,STAGE_PACKS.length*144-H+100);
  if(maxScroll>0){
    const r=stageScrollY/maxScroll;
    const barH=40,barY=60+safeTop+(H-80-safeTop)*r;
    ctx.fillStyle='#fff2';rr(W-6,barY,3,barH,2);ctx.fill();
  }
}

function drawStageClear(){
  const oa=Math.min(stageClearT/40,0.7);
  ctx.fillStyle=`rgba(0,0,0,${oa})`;ctx.fillRect(-20,-20,W+40,H+40);
  if(stageClearT<15)return;
  const si=Math.min((stageClearT-15)/20,1),e=1-Math.pow(1-si,3);
  ctx.save();ctx.translate(0,-50*(1-e));ctx.globalAlpha=e;

  ctx.fillStyle='#ffd700';ctx.font='bold 36px monospace';ctx.textAlign='center';
  ctx.shadowColor='#ffd70077';ctx.shadowBlur=22;
  ctx.fillText('\u30B9\u30C6\u30FC\u30B8\u30AF\u30EA\u30A2\uFF01',W/2,H*0.2);ctx.shadowBlur=0;

  // Stage info
  ctx.fillStyle='#fff8';ctx.font='13px monospace';
  ctx.fillText(STAGE_PACKS[currentPackIdx].name+' - '+currentStageData.name,W/2,H*0.28);

  const cardY=H*0.32,cardH=180;
  ctx.fillStyle='#0008';rr(W/2-125,cardY,250,cardH,14);ctx.fill();
  ctx.strokeStyle='#ffd70044';ctx.lineWidth=1;rr(W/2-125,cardY,250,cardH,14);ctx.stroke();

  drawCharacter(W/2,cardY+35,selChar,18,0,1,'happy');

  ctx.fillStyle='#fff';ctx.font='bold 28px monospace';ctx.textAlign='center';
  ctx.fillText(score+'m',W/2,cardY+75);

  ctx.fillStyle='#fff6';ctx.font='11px monospace';
  ctx.fillText('\u30B3\u30A4\u30F3: '+totalCoins+'  \u53CD\u8EE2: '+totalFlips,W/2,cardY+100);
  if(maxCombo>1){ctx.fillStyle='#ff6b35aa';ctx.fillText('\u6700\u5927\u30B3\u30F3\u30DC: '+maxCombo+'x',W/2,cardY+118);}

  // Big coin reward
  if(gotNewBigCoin&&stageClearT>30){
    const ba=Math.min((stageClearT-30)/20,1);
    const bs=1+Math.sin(stageClearT*0.08)*0.1;
    ctx.globalAlpha=ba*e;
    ctx.save();ctx.translate(W/2,cardY+148);ctx.scale(bs,bs);
    drawBigCoin(0,0,16);
    ctx.fillStyle='#ffd700';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('+1',28,6);
    ctx.restore();ctx.globalAlpha=e;
  }else if(!gotNewBigCoin){
    ctx.fillStyle='#fff3';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('\u30AF\u30EA\u30A2\u6E08\u307F',W/2,cardY+150);
  }

  if(stageClearT>60){const ta=Math.sin(stageClearT*0.07)*0.3+0.7;ctx.globalAlpha=ta*e;ctx.fillStyle='#fff';ctx.font='bold 15px monospace';ctx.fillText('\u30BF\u30C3\u30D7\u3067\u7D9A\u3051\u308B',W/2,H*0.85);}

  ctx.restore();ctx.globalAlpha=1;

  // Confetti
  parts.forEach(p=>{ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.ml),0,6.28);ctx.fill();});
  ctx.globalAlpha=1;
}

function drawDead(){
  const oa=Math.min(deadT/40,0.65);
  ctx.fillStyle=`rgba(0,0,0,${oa})`;ctx.fillRect(-20,-20,W+40,H+40);
  if(deadT<15)return;
  const si=Math.min((deadT-15)/20,1),e=1-Math.pow(1-si,3);
  ctx.save();ctx.translate(0,-55*(1-e));ctx.globalAlpha=e;

  ctx.fillStyle=tc('obs');ctx.font='bold 40px monospace';ctx.textAlign='center';
  ctx.shadowColor=tca('obs',0x55);ctx.shadowBlur=22;
  ctx.fillText('\u30B2\u30FC\u30E0\u30AA\u30FC\u30D0\u30FC',W/2,H*0.22);ctx.shadowBlur=0;

  const cardY=H*0.27,cardH=200;
  ctx.fillStyle='#0008';rr(W/2-125,cardY,250,cardH,14);ctx.fill();
  ctx.strokeStyle='#fff1';ctx.lineWidth=1;rr(W/2-125,cardY,250,cardH,14);ctx.stroke();

  drawCharacter(W/2,cardY+35,selChar,18,0,1,'dead');

  ctx.fillStyle='#fff7';ctx.font='13px monospace';ctx.textAlign='center';ctx.fillText('\u30B9\u30B3\u30A2',W/2,cardY+65);
  ctx.fillStyle='#fff';ctx.font='bold 44px monospace';
  ctx.shadowColor='#fff3';ctx.shadowBlur=12;ctx.fillText(score,W/2,cardY+108);ctx.shadowBlur=0;

  if(!isStageMode&&newHi){const np=Math.sin(deadT*0.12)*0.3+0.7;ctx.globalAlpha=np*e;ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';ctx.shadowColor='#ffd70055';ctx.shadowBlur=10;ctx.fillText('\u65B0\u8A18\u9332\uFF01',W/2,cardY-6);ctx.shadowBlur=0;ctx.globalAlpha=e;}

  ctx.fillStyle='#fff5';ctx.font='11px monospace';
  if(isStageMode){
    ctx.fillText(STAGE_PACKS[currentPackIdx].name+' - '+currentStageData.name,W/2,cardY+130);
    ctx.fillStyle='#fff4';ctx.fillText('\u76EE\u6A19: '+currentStageData.dist+'m  \u9054\u6210: '+score+'m',W/2,cardY+146);
  }else{
    ctx.fillText('\u30D9\u30B9\u30C8: '+highScore,W/2,cardY+130);
  }
  if(maxCombo>1){ctx.fillStyle='#ff6b35aa';ctx.fillText('\u6700\u5927\u30B3\u30F3\u30DC: '+maxCombo+'x',W/2,cardY+162);}
  ctx.fillStyle='#fff4';ctx.fillText('\u30B3\u30A4\u30F3: '+totalCoins+'  \u53CD\u8EE2: '+totalFlips,W/2,cardY+178);

  if(!isStageMode){
    let rating='';
    if(score>=500)rating='\u4F1D\u8AAC\u7D1A\uFF01 \u2605';
    else if(score>=200)rating='\u7D20\u6674\u3089\u3057\u3044\uFF01';
    else if(score>=100)rating='\u3059\u3054\u3044\uFF01';
    else if(score>=50)rating='\u3044\u3044\u611F\u3058\uFF01';
    else if(score>=25)rating='\u307E\u305A\u307E\u305A';
    if(rating){ctx.fillStyle='#fff6';ctx.font='bold 13px monospace';ctx.fillText(rating,W/2,cardY+198);}
  }

  if(deadT>45){const ta=Math.sin(deadT*0.07)*0.3+0.7;ctx.globalAlpha=ta*e;ctx.fillStyle='#fff';ctx.font='bold 15px monospace';
    ctx.fillText(isStageMode?'\u30BF\u30C3\u30D7\u3067\u30B9\u30C6\u30FC\u30B8\u9078\u629E\u3078':'\u30BF\u30C3\u30D7\u3067\u7D9A\u3051\u308B',W/2,H*0.82);}

  ctx.restore();ctx.globalAlpha=1;
}

function loop(ts){
  if(!lastTime)lastTime=ts;
  const dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  try{update(dt);draw();}catch(e){console.error('loop error:',e);}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
