<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gravity Dash</title>
<meta name="description" content="重力反転アクションランナー。タップでジャンプ、スワイプで重力反転！">
<meta name="theme-color" content="#0a0a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gravity Dash">
<link rel="apple-touch-icon" id="apple-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.json">
<script>
(function(){
  var c=document.createElement('canvas'),x=c.getContext('2d'),S=180;
  c.width=S;c.height=S;
  var bg=x.createLinearGradient(0,0,0,S);
  bg.addColorStop(0,'#0a0a2e');bg.addColorStop(1,'#1a1a4e');
  x.fillStyle=bg;x.fillRect(0,0,S,S);
  [[28,35,0.5],[148,28,0.4],[123,53,0.6],[42,133,0.3],[140,140,0.5]].forEach(function(s){
    x.globalAlpha=s[2];x.fillStyle='#fff';x.beginPath();x.arc(s[0],s[1],1,0,6.28);x.fill();
  });
  x.globalAlpha=1;
  x.strokeStyle='#2a6aaf';x.lineWidth=1.5;x.globalAlpha=0.5;
  x.beginPath();x.moveTo(0,148);x.lineTo(S,148);x.stroke();
  x.beginPath();x.moveTo(0,32);x.lineTo(S,32);x.stroke();
  x.globalAlpha=1;
  var px=90,py=90,ps=26,ph=ps/2;
  var pg=x.createLinearGradient(px-ph,py-ph,px+ph,py+ph);
  pg.addColorStop(0,'#00e5ff');pg.addColorStop(1,'#00b8d4');
  x.fillStyle=pg;
  x.beginPath();x.arc(px,py,ph,0,6.28);x.fill();
  x.fillStyle='#fff';x.beginPath();x.arc(px+3,py-3,5,0,6.28);x.fill();
  x.fillStyle='#0a0a2e';x.beginPath();x.arc(px+5,py-3,2.5,0,6.28);x.fill();
  x.fillStyle='#ffd700';x.globalAlpha=0.8;
  x.beginPath();x.arc(108,63,6,0,6.28);x.fill();
  x.globalAlpha=1;
  try{
    var url=c.toDataURL('image/png');
    document.getElementById('apple-icon').href=url;
    var fav=document.querySelector('link[rel="icon"]');
    if(fav)fav.href=url;
  }catch(e){}
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom)}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#0a0a1a;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;position:fixed;top:0;left:0;right:0;bottom:0;overscroll-behavior:none;-webkit-text-size-adjust:100%}
canvas{display:block;width:100%;height:100%}
#loginOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:linear-gradient(180deg,#0a0a2e 0%,#1a1a4e 50%,#0f0f23 100%);flex-direction:column;align-items:center;justify-content:flex-start;padding-top:12vh;font-family:monospace;overflow:hidden}
#loginOverlay.active{display:flex}
#loginOverlay .stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
#loginOverlay .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate}
@keyframes twinkle{0%{opacity:0.2}100%{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes titlePulse{0%,100%{text-shadow:0 0 30px #00e5ff66,0 0 60px #00e5ff22}50%{text-shadow:0 0 50px #00e5ffaa,0 0 100px #00e5ff44}}
#loginOverlay .title-gravity{font-size:clamp(36px,10vw,52px);font-weight:900;color:#00e5ff;text-align:center;letter-spacing:6px;animation:titlePulse 3s infinite;margin:0;line-height:1.1}
#loginOverlay .title-dash{font-size:clamp(38px,11vw,56px);font-weight:900;color:#ff3860;text-align:center;letter-spacing:8px;text-shadow:0 0 40px #ff386088,0 4px 0 #cc2244;margin:0;line-height:1.1}
#loginOverlay .subtitle{color:#fff6;font-size:11px;margin-top:6px;letter-spacing:2px}
#loginOverlay .login-box{margin-top:5vh;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:1}
#loginOverlay .login-label{color:#ffd700;font-size:14px;font-weight:bold}
#loginOverlay input{width:220px;height:44px;font-size:20px;text-align:center;background:#0a0a2e;color:#fff;border:2px solid #00e5ff;border-radius:10px;outline:none;font-family:monospace;padding:0 12px;caret-color:#00e5ff}
#loginOverlay input:focus{border-color:#ffd700;box-shadow:0 0 20px #ffd70044}
#loginOverlay input::placeholder{color:#fff3;font-size:14px}
#loginOverlay .login-btn{width:220px;height:48px;background:linear-gradient(135deg,#00e5ff22,#00e5ff11);border:2px solid #00e5ff;border-radius:10px;color:#00e5ff;font-size:18px;font-weight:bold;font-family:monospace;cursor:pointer;transition:all 0.2s;letter-spacing:3px}
#loginOverlay .login-btn:active{background:#00e5ff33;transform:scale(0.96)}
#loginOverlay .login-btn.ready{border-color:#ffd700;color:#ffd700;box-shadow:0 0 24px #ffd70044;background:linear-gradient(135deg,#ffd70022,#ffd70011)}
#loginOverlay .footer{position:absolute;bottom:4vh;color:#fff2;font-size:10px;letter-spacing:1px}
#loginOverlay .deco-char{animation:floatY 2.5s ease-in-out infinite;margin-top:2vh}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="loginOverlay">
  <div class="stars"></div>
  <div class="title-gravity">GRAVITY</div>
  <div class="title-dash">DASH</div>
  <div class="subtitle">Gravity-Flip Action Runner</div>
  <div class="login-box">
    <div class="login-label">ユーザー名を入力</div>
    <input id="nameInput" type="text" maxlength="12" placeholder="なまえ" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="login-btn" id="loginBtn">はじめる</button>
  </div>
  <div class="footer">Gravity-Flip Action Runner</div>
</div>
<script src="js/data.js"></script>
<script src="js/terrain.js"></script>
<script src="js/spawning.js"></script>
<script src="js/boss.js"></script>
<script src="js/helpers.js"></script>
<script src="js/input.js"></script>
<script src="js/collision.js"></script>
<script src="js/update.js"></script>
<script src="js/draw.js"></script>
<script src="js/main.js"></script>
</body>
</html>
