<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gravity Dash</title>
<meta name="description" content="重力反転アクションランナー。タップでジャンプ、スワイプで重力反転！">
<meta name="theme-color" content="#0a0a2e">
<meta name="screen-orientation" content="portrait">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gravity Dash">
<link rel="apple-touch-icon" id="apple-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.json">
<script>
(function(){
  var c=document.createElement('canvas'),x=c.getContext('2d'),S=180;
  c.width=S;c.height=S;
  var bg=x.createLinearGradient(0,0,0,S);
  bg.addColorStop(0,'#0a0a2e');bg.addColorStop(1,'#1a1a4e');
  x.fillStyle=bg;x.fillRect(0,0,S,S);
  [[28,56,0.5],[148,50,0.4],[123,72,0.6],[42,118,0.3],[140,115,0.5]].forEach(function(s){
    x.globalAlpha=s[2];x.fillStyle='#fff';x.beginPath();x.arc(s[0],s[1],1,0,6.28);x.fill();
  });
  x.globalAlpha=1;
  // Floor terrain (rectangular stepped platforms matching in-game)
  x.globalAlpha=0.9;
  var fg=x.createLinearGradient(0,148,0,S);
  fg.addColorStop(0,'#1e3a5f');fg.addColorStop(1,'#152a45');
  x.fillStyle=fg;
  x.beginPath();x.moveTo(0,151);
  x.lineTo(28,151);x.lineTo(28,151);
  x.lineTo(28,145);x.lineTo(55,145);x.lineTo(55,151);
  x.lineTo(70,151);
  x.lineTo(70,139);x.lineTo(105,139);x.lineTo(105,148);
  x.lineTo(130,148);x.lineTo(130,151);
  x.lineTo(155,151);x.lineTo(155,143);x.lineTo(S,143);
  x.lineTo(S,S);x.lineTo(0,S);x.closePath();x.fill();
  // Floor neon edges
  x.strokeStyle='#2a6aaf';x.lineWidth=1.2;x.shadowColor='#2a6aaf';x.shadowBlur=4;
  x.beginPath();x.moveTo(0,151);x.lineTo(28,151);x.stroke();
  x.beginPath();x.moveTo(28,151);x.lineTo(28,145);x.stroke();
  x.beginPath();x.moveTo(28,145);x.lineTo(55,145);x.stroke();
  x.beginPath();x.moveTo(55,145);x.lineTo(55,151);x.stroke();
  x.beginPath();x.moveTo(55,151);x.lineTo(70,151);x.stroke();
  x.beginPath();x.moveTo(70,151);x.lineTo(70,139);x.stroke();
  x.beginPath();x.moveTo(70,139);x.lineTo(105,139);x.stroke();
  x.beginPath();x.moveTo(105,139);x.lineTo(105,148);x.stroke();
  x.beginPath();x.moveTo(105,148);x.lineTo(130,148);x.stroke();
  x.beginPath();x.moveTo(130,148);x.lineTo(130,151);x.stroke();
  x.beginPath();x.moveTo(130,151);x.lineTo(155,151);x.stroke();
  x.beginPath();x.moveTo(155,151);x.lineTo(155,143);x.stroke();
  x.beginPath();x.moveTo(155,143);x.lineTo(S,143);x.stroke();
  x.shadowBlur=0;
  // Ceiling terrain (rectangular stepped platforms)
  var cg=x.createLinearGradient(0,0,0,35);
  cg.addColorStop(0,'#152a45');cg.addColorStop(1,'#1e3a5f');
  x.fillStyle=cg;
  x.beginPath();x.moveTo(0,0);x.lineTo(S,0);
  x.lineTo(S,32);x.lineTo(150,32);
  x.lineTo(150,28);x.lineTo(120,28);x.lineTo(120,35);
  x.lineTo(95,35);x.lineTo(95,30);
  x.lineTo(65,30);x.lineTo(65,28);
  x.lineTo(40,28);x.lineTo(40,33);
  x.lineTo(20,33);x.lineTo(20,29);
  x.lineTo(0,29);x.closePath();x.fill();
  // Ceiling neon edges
  x.strokeStyle='#2a6aaf';x.lineWidth=1.2;x.shadowColor='#2a6aaf';x.shadowBlur=4;
  x.beginPath();x.moveTo(0,29);x.lineTo(20,29);x.stroke();
  x.beginPath();x.moveTo(20,29);x.lineTo(20,33);x.stroke();
  x.beginPath();x.moveTo(20,33);x.lineTo(40,33);x.stroke();
  x.beginPath();x.moveTo(40,33);x.lineTo(40,28);x.stroke();
  x.beginPath();x.moveTo(40,28);x.lineTo(65,28);x.stroke();
  x.beginPath();x.moveTo(65,28);x.lineTo(65,30);x.stroke();
  x.beginPath();x.moveTo(65,30);x.lineTo(95,30);x.stroke();
  x.beginPath();x.moveTo(95,30);x.lineTo(95,35);x.stroke();
  x.beginPath();x.moveTo(95,35);x.lineTo(120,35);x.stroke();
  x.beginPath();x.moveTo(120,35);x.lineTo(120,28);x.stroke();
  x.beginPath();x.moveTo(120,28);x.lineTo(150,28);x.stroke();
  x.beginPath();x.moveTo(150,28);x.lineTo(150,32);x.stroke();
  x.beginPath();x.moveTo(150,32);x.lineTo(S,32);x.stroke();
  x.shadowBlur=0;
  x.globalAlpha=1;
  // Player
  var px=90,py=90,ps=26,ph=ps/2;
  var pg=x.createLinearGradient(px-ph,py-ph,px+ph,py+ph);
  pg.addColorStop(0,'#00e5ff');pg.addColorStop(1,'#00b8d4');
  x.fillStyle=pg;
  x.beginPath();x.arc(px,py,ph,0,6.28);x.fill();
  x.fillStyle='#fff';x.beginPath();x.arc(px+3,py-3,5,0,6.28);x.fill();
  x.fillStyle='#0a0a2e';x.beginPath();x.arc(px+5,py-3,2.5,0,6.28);x.fill();
  x.fillStyle='#ffd700';x.globalAlpha=0.8;
  x.beginPath();x.arc(108,63,6,0,6.28);x.fill();
  x.globalAlpha=1;
  try{
    var url=c.toDataURL('image/png');
    document.getElementById('apple-icon').href=url;
    var fav=document.querySelector('link[rel="icon"]');
    if(fav)fav.href=url;
  }catch(e){}
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom)}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;position:fixed;top:0;left:0;right:0;bottom:0;overscroll-behavior:none;-webkit-text-size-adjust:100%}
body{display:flex;justify-content:center;align-items:center}
#gameWrap{width:100%;max-width:430px;height:100%;height:100dvh;max-height:844px;position:relative;overflow:hidden;background:#0a0a1a;border-radius:0}
@media(min-height:845px){#gameWrap{border-radius:12px;box-shadow:0 0 40px #00e5ff22}}
canvas{display:block;width:100%;height:100%}
#loginOverlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;background:linear-gradient(180deg,#0a0a2e 0%,#1a1a4e 50%,#0f0f23 100%);flex-direction:column;align-items:center;justify-content:flex-start;padding-top:12vh;font-family:monospace;overflow:hidden}
#loginOverlay.active{display:flex}
#loginOverlay .stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
#loginOverlay .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate}
@keyframes twinkle{0%{opacity:0.2}100%{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes titlePulse{0%,100%{text-shadow:0 0 30px #00e5ff66,0 0 60px #00e5ff22}50%{text-shadow:0 0 50px #00e5ffaa,0 0 100px #00e5ff44}}
#loginOverlay .title-gravity{font-size:clamp(36px,10vw,52px);font-weight:900;color:#00e5ff;text-align:center;letter-spacing:6px;animation:titlePulse 3s infinite;margin:0;line-height:1.1}
#loginOverlay .title-dash{font-size:clamp(38px,11vw,56px);font-weight:900;color:#ff3860;text-align:center;letter-spacing:8px;text-shadow:0 0 40px #ff386088,0 4px 0 #cc2244;margin:0;line-height:1.1}
#loginOverlay .subtitle{color:#fff6;font-size:11px;margin-top:6px;letter-spacing:2px}
#loginOverlay .login-box{margin-top:5vh;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:1}
#loginOverlay .login-label{color:#ffd700;font-size:14px;font-weight:bold}
#loginOverlay input{width:220px;height:44px;font-size:20px;text-align:center;background:#0a0a2e;color:#fff;border:2px solid #00e5ff;border-radius:10px;outline:none;font-family:monospace;padding:0 12px;caret-color:#00e5ff}
#loginOverlay input:focus{border-color:#ffd700;box-shadow:0 0 20px #ffd70044}
#loginOverlay input::placeholder{color:#fff3;font-size:14px}
#loginOverlay .login-btn{width:220px;height:48px;background:linear-gradient(135deg,#00e5ff22,#00e5ff11);border:2px solid #00e5ff;border-radius:10px;color:#00e5ff;font-size:18px;font-weight:bold;font-family:monospace;cursor:pointer;transition:all 0.2s;letter-spacing:3px}
#loginOverlay .login-btn:active{background:#00e5ff33;transform:scale(0.96)}
#loginOverlay .login-btn.ready{border-color:#ffd700;color:#ffd700;box-shadow:0 0 24px #ffd70044;background:linear-gradient(135deg,#ffd70022,#ffd70011)}
#loginOverlay .google-btn{width:220px;height:48px;background:#fff;border:none;border-radius:10px;color:#333;font-size:15px;font-weight:bold;font-family:monospace;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;letter-spacing:1px;box-shadow:0 2px 8px #0004}
#loginOverlay .google-btn:active{transform:scale(0.96);box-shadow:0 1px 4px #0002}
#loginOverlay .twitter-btn{width:220px;height:48px;background:#000;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:bold;font-family:monospace;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;letter-spacing:1px;box-shadow:0 2px 8px #0004}
#loginOverlay .twitter-btn:active{transform:scale(0.96);box-shadow:0 1px 4px #0002}
#loginOverlay .login-divider{display:flex;align-items:center;gap:10px;width:220px;color:#fff4;font-size:11px}
#loginOverlay .login-divider::before,#loginOverlay .login-divider::after{content:'';flex:1;height:1px;background:#fff2}
#loginOverlay .footer{position:absolute;bottom:4vh;color:#fff2;font-size:10px;letter-spacing:1px}
#loginOverlay .deco-char{animation:floatY 2.5s ease-in-out infinite;margin-top:2vh}
</style>
</head>
<body>
<div id="gameWrap">
<canvas id="game"></canvas>
<div id="loginOverlay">
  <div class="stars"></div>
  <div class="title-gravity">GRAVITY</div>
  <div class="title-dash">DASH</div>
  <div class="subtitle">Gravity-Flip Action Runner</div>
  <div class="login-box">
    <button class="google-btn" id="googleBtn"><svg viewBox="0 0 48 48" width="20" height="20" style="vertical-align:middle;margin-right:8px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Googleでログイン</button>
    <button class="twitter-btn" id="twitterBtn"><svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align:middle;margin-right:8px;fill:#fff"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>Xでログイン</button>
    <div class="login-divider" id="loginDivider"><span>または</span></div>
    <div class="login-label" id="loginLabel">ゲストログイン</div>
    <input id="nameInput" type="text" maxlength="12" placeholder="なまえ" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div id="loginNote" style="color:#ff9800cc;font-size:9px;margin:-2px 0 -4px;font-family:monospace;text-align:center;line-height:1.4">※ゲストデータはブラウザに保存されます<br>キャッシュ削除等でデータが消失する場合があります</div>
    <div id="nameError" style="color:#ff3860;font-size:12px;min-height:16px;margin:-4px 0;font-family:monospace"></div>
    <button class="login-btn" id="loginBtn">はじめる</button>
  </div>
  <div class="footer">Gravity-Flip Action Runner</div>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

<script src="js/main.js?v=24"></script>
</body>
</html>
