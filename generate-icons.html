<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h2>Grav Hopper Icon Generator</h2>
<p>Right-click each icon and "Save image as..." to save</p>
<div id="icons"></div>
<script>
const sizes = [180, 192, 512];
const container = document.getElementById('icons');

const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="player" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00b8d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <circle cx="80" cy="100" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="80" r="2.5" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="150" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="380" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="400" r="1.8" fill="#fff" opacity="0.5"/>
  <line x1="0" y1="420" x2="512" y2="420" stroke="#2a6aaf" stroke-width="3" opacity="0.6"/>
  <line x1="0" y1="92" x2="512" y2="92" stroke="#2a6aaf" stroke-width="3" opacity="0.6"/>
  <rect x="130" y="92" width="28" height="120" rx="4" fill="#ff3860" opacity="0.7"/>
  <rect x="130" y="290" width="28" height="130" rx="4" fill="#ff3860" opacity="0.7"/>
  <rect x="350" y="92" width="28" height="170" rx="4" fill="#ff3860" opacity="0.5"/>
  <rect x="350" y="340" width="28" height="80" rx="4" fill="#ff3860" opacity="0.5"/>
  <g transform="translate(256, 256)">
    <rect x="-45" y="-45" width="90" height="90" rx="14" fill="#00e5ff" opacity="0.15"/>
    <rect x="-38" y="-38" width="76" height="76" rx="12" fill="url(#player)"/>
    <rect x="-28" y="-28" width="56" height="56" rx="8" fill="#fff" opacity="0.12"/>
    <circle cx="10" cy="-8" r="14" fill="#fff"/>
    <circle cx="14" cy="-8" r="7" fill="#0a0a2e"/>
    <circle cx="17" cy="-12" r="3" fill="#fff"/>
    <path d="M-16 52 L0 66 L16 52" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <circle cx="280" cy="180" r="16" fill="#ffd700" opacity="0.8"/>
  <circle cx="276" cy="176" r="5" fill="#fff" opacity="0.4"/>
</svg>`;

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svgData], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    const div = document.createElement('div');
    div.style.margin = '20px';
    div.innerHTML = `<h3>${size}x${size} (icon-${size}.png)</h3>`;
    const imgEl = new Image();
    imgEl.src = canvas.toDataURL('image/png');
    imgEl.style.border = '1px solid #ccc';
    div.appendChild(imgEl);
    // Auto download
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `icon-${size}.png`;
    a.textContent = ` Download icon-${size}.png`;
    div.appendChild(a);
    container.appendChild(div);
  };
  img.src = url;
});
</script>
</body>
</html>
